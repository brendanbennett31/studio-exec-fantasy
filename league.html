<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>League Test</title>
<style>
body{background:#0d0d14;color:#e8e8f0;font-family:sans-serif;padding:40px;text-align:center}
.status{margin:20px auto;padding:16px;border-radius:8px;max-width:500px}
.ok{background:rgba(52,211,153,0.1);border:1px solid #34d399;color:#34d399;margin-bottom:8px}
.err{background:rgba(239,68,68,0.1);border:1px solid #ef4444;color:#ef4444;margin-bottom:8px}
</style>
</head>
<body>
<h1 style="color:#f5c842;font-size:32px;margin-bottom:8px">STUDIO EXEC FANTASY</h1>
<p style="color:#6a6a7e;margin-bottom:32px">Diagnostic Page</p>
<div id="status"></div>
<script>
const SUPABASE_URL="https://fymkwkbatklfynnhxrsf.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5bWt3a2JhdGtsZnlubmh4cnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTIzOTksImV4cCI6MjA5NjM2ODM5OX0.XjO1xIS2WLF8JNIwIAKqjCL65ISkSu2u7VaeG8gzaew";
const LEAGUE_UUID=new URLSearchParams(window.location.search).get('id');
const session=(()=>{try{return JSON.parse(localStorage.getItem('sef_session'));}catch(e){return null;}})();
const log=(msg,ok)=>{const d=document.createElement('div');d.className='status '+(ok?'ok':'err');d.textContent=(ok?'OK: ':'ERR: ')+msg;document.getElementById('status').appendChild(d);};
log('Page loaded',true);
log('League UUID: '+(LEAGUE_UUID||'MISSING - add ?id=... to URL'),!!LEAGUE_UUID);
log('Session: '+(session?'Found, user='+session.user?.id:'NOT FOUND - not logged in'),!!session);
async function run(){
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/picks?league_id=eq.sef-2026&limit=1',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}});
    const d=await r.json();
    log('Supabase picks: HTTP '+r.status+', '+d.length+' row(s)',r.ok);
  }catch(e){log('Supabase FAILED: '+e.message,false);}
  if(LEAGUE_UUID){
    try{
      const r=await fetch(SUPABASE_URL+'/rest/v1/leagues?id=eq.'+LEAGUE_UUID+'&select=name',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+(session?.access_token||SUPABASE_ANON_KEY)}});
      const d=await r.json();
      log('League: '+(d[0]?.name||'NOT FOUND'),d.length>0);
    }catch(e){log('League lookup FAILED: '+e.message,false);}
  }
  log('Done',true);
}
run();
</script>
</body>
</html>
