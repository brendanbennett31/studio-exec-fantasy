];

// fmt helper for awards tab - handles billions
function fmtAward(n){
  if(n>=1e9) return "$"+(n/1e9).toFixed(2)+"B";
  if(n>=1e6) return "$"+(n/1e6).toFixed(1)+"M";
  return "$"+Math.round(n).toLocaleString();
}

function AwardsTab({films}){
  const[odds,setOdds]=useState([]);
  const[loading,setLoading]=useState(true);
  const[oddsUpdated,setOddsUpdated]=useState(null);
  const[hoveredSlice,setHoveredSlice]=useState(null);
  const[animatedBars,setAnimatedBars]=useState(false);

  useEffect(()=>{
    async function loadOdds(){
      try{
        const rows=await supabaseFetch("gold_derby_odds","season=eq.2027&order=nom_odds.desc");
        setOdds(rows||[]);
        if(rows.length) setOddsUpdated(rows[0].updated_at);
      }catch(e){console.warn("awards odds load failed:",e.message);}
      setLoading(false);
    }
    loadOdds();
  },[]);

  useEffect(()=>{
    if(odds.length>0){
      const t=setTimeout(()=>setAnimatedBars(true),200);
      return()=>clearTimeout(t);
    }
  },[odds]);

  const filmOddsMap=useMemo(()=>{
    const map={};
    odds.forEach(r=>{
      if(!map[r.film_title]) map[r.film_title]={};
      map[r.film_title][r.category]={nom:r.nom_odds,win:r.win_odds||0};
    });
    return map;
  },[odds]);

  const performerMap=useMemo(()=>{
    const map={};
    odds.forEach(r=>{
      if(!r.performer_name) return;
      if(!map[r.category]) map[r.category]=[];
      map[r.category].push({film:r.film_title,performer:r.performer_name,nom_odds:r.nom_odds});
    });
    return map;
  },[odds]);

  function calcFilmProjected(filmTitle){
    let noms=0,wins=0,nomCount=0,winCount=0,ev=0;
    OSCAR_CATEGORIES.forEach(cat=>{
      const catOdds=odds.filter(o=>o.category===cat.key).sort((a,b)=>b.nom_odds-a.nom_odds);
      const rank=catOdds.findIndex(o=>o.film_title===filmTitle);
      if(rank<0) return;
      const d=filmOddsMap[filmTitle]?.[cat.key];
      if(d){ ev+=(d.nom/100)*cat.nom_value+(d.win/100)*(cat.bp_win?50:cat.win_value); }
      if(rank<cat.slots){
        noms+=cat.nom_value; nomCount++;
        if(rank===0){ wins+=(cat.bp_win?50:cat.win_value); winCount++; }
      }
    });
    return{projected:noms+wins,noms,wins,nomCount,winCount,ev};
  }

  const filmProjections=useMemo(()=>{
    const proj={};
    new Set(odds.map(o=>o.film_title)).forEach(t=>{ proj[t]=calcFilmProjected(t); });
    return proj;
  },[odds,filmOddsMap]);

  // Build a case-insensitive slate lookup
  const slateFilmsLower=useMemo(()=>{
    const map={};
    (films||[]).forEach(f=>{ map[f.title.toLowerCase().trim()]=f; });
    return map;
  },[films]);

  const slateFilms=new Set((films||[]).map(f=>f.title));

  function findSlateFilm(goldDerbyTitle){
    // Exact match first
    if(slateFilms.has(goldDerbyTitle)) return slateFilmsLower[goldDerbyTitle.toLowerCase().trim()];
    // Case-insensitive match
    return slateFilmsLower[goldDerbyTitle.toLowerCase().trim()]||null;
  }

  const execAwardData=useMemo(()=>{
    const evs={};
    const allTeams=[...new Set((films||[]).map(f=>f.team))];
    allTeams.forEach(team=>{ evs[team]={projected:0,ev:0,nomCount:0,winCount:0,films:[]}; });
    (films||[]).forEach(f=>{
      if(f.voided) return;
      const proj=filmProjections[f.title];
      if(!proj||proj.projected===0) return;
      evs[f.team].projected+=proj.projected;
      evs[f.team].ev+=proj.ev;
      evs[f.team].nomCount+=proj.nomCount;
      evs[f.team].winCount+=proj.winCount;
      evs[f.team].films.push({title:f.title,...proj});
    });
    return evs;
  },[films,filmProjections]);

  const projectedStandings=useMemo(()=>{
    const execs={};
    (films||[]).forEach(f=>{
      if(!execs[f.team]) execs[f.team]={team:f.team,bo:0,spent:0};
      if(!f.voided){execs[f.team].bo+=f.bo;execs[f.team].spent+=f.bid;}
    });
    const budget=500;
    return Object.values(execs).map(e=>{
      const unspent=Math.max(0,budget-e.spent)*1e6;
      const awardProj=(execAwardData[e.team]?.projected||0)*1e6;
      const total=e.bo+unspent+awardProj;
      return{...e,unspent,awardProj,total};
    }).sort((a,b)=>b.total-a.total);
  },[films,execAwardData]);

  const topAwardFilm=useMemo(()=>{
    let best=null,bestProj=0;
    (films||[]).forEach(f=>{
      if(f.voided) return;
      const proj=filmProjections[f.title]?.projected||0;
      if(proj>bestProj){bestProj=proj;best=f;}
    });
    return best?{...best,proj:bestProj}:null;
  },[films,filmProjections]);

  const darkHorse=useMemo(()=>{
    const off=odds.filter(o=>!findSlateFilm(o.film_title)&&o.nom_odds>10);
    if(!off.length) return null;
    return off.sort((a,b)=>b.nom_odds-a.nom_odds)[0];
  },[odds,slateFilmsLower]);

  const biggestWinner=useMemo(()=>{
    let best=null,bestTotal=0;
    Object.entries(execAwardData).forEach(([team,data])=>{
      const t=data.nomCount+data.winCount;
      if(t>bestTotal){bestTotal=t;best={team,nomCount:data.nomCount,winCount:data.winCount};}
    });
    return best;
  },[execAwardData]);

  const allTeams=[...new Set((films||[]).map(f=>f.team))];
  const nomPieData=useMemo(()=>{
    return allTeams.map(team=>({
      team,
      noms:execAwardData[team]?.nomCount||0,
      color:EXEC_COLORS[team]||"#6a6a7e"
    })).sort((a,b)=>b.noms-a.noms);
  },[execAwardData]);

  const totalNoms=nomPieData.reduce((s,d)=>s+d.noms,0)||1;

  const CATEGORY_ORDER=OSCAR_CATEGORIES.map(c=>c.key);
  const activeCategories=useMemo(()=>{
    const inData=new Set(odds.map(o=>o.category));
    return CATEGORY_ORDER.filter(c=>inData.has(c));
  },[odds]);

  const actorCats=new Set(["Best Actress","Best Actor","Best Supporting Actress","Best Supporting Actor"]);
  const directorCat="Best Director";

  if(loading) return(
    <div style={{textAlign:"center",padding:"48px 20px",color:"#6a6a7e"}}>
      <div style={{width:20,height:20,border:"2px solid #222233",borderTopColor:"#d4a843",borderRadius:"50%",animation:"spin 0.7s linear infinite",margin:"0 auto 16px"}}/>
      Loading awards projections...
    </div>
  );

  if(!odds.length) return(
    <div style={{background:"#111119",border:"1px solid #222233",borderRadius:10,padding:"40px 20px",textAlign:"center"}}>
      <div style={{fontSize:14,color:"#6a6a7e",marginBottom:8}}>No odds data yet.</div>
    </div>
  );

  const card={background:"#111119",border:"1px solid #222233",borderRadius:10,padding:"16px 14px",marginBottom:12};
  const statCard={background:"#1a1a28",border:"1px solid #222233",borderRadius:8,padding:"14px 16px",flex:1,minWidth:140};
  const maxTotal=projectedStandings[0]?.total||1;

  function AnimBar({pct,color,height,glow}){
    return(
      <div style={{flex:1,height:height||6,background:"#1a1a28",borderRadius:3,overflow:"hidden"}}>
        <div style={{
          height:"100%",
          width:animatedBars?`${Math.min(pct,100)}%`:"0%",
          background:color,borderRadius:3,
          boxShadow:glow?`0 0 8px ${color}80`:"none",
          transition:"width 1s cubic-bezier(0.4,0,0.2,1)"
        }}/>
      </div>
    );
  }

  function DonutChart({data,total,size}){
    const r=size*0.38, ir=r*0.55, cx=size/2, cy=size/2;
    let angle=-Math.PI/2;
    const slices=data.map(d=>{
      const pct=d.noms/total;
      const sweep=pct*Math.PI*2;
      const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
      angle+=sweep;
      const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
      const large=sweep>Math.PI?1:0;
      const path=sweep<0.001?"":`M${cx},${cy} L${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} Z`;
      return{...d,path};
    });
    return(
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{cursor:"pointer"}}>
        {slices.map(s=>s.path?(
          <path key={s.team} d={s.path}
            fill={s.color}
            opacity={hoveredSlice===null?0.82:hoveredSlice===s.team?1:0.2}
            style={{transition:"opacity 0.25s ease"}}
            onMouseEnter={()=>setHoveredSlice(s.team)}
            onMouseLeave={()=>setHoveredSlice(null)}
          />
        ):null)}
        <circle cx={cx} cy={cy} r={ir} fill="#111119" style={{pointerEvents:"none"}}/>
        <text x={cx} y={cy-4} textAnchor="middle" fill="#e8e8f0" fontSize={size*0.1} fontWeight="700" style={{pointerEvents:"none"}}>{total}</text>
        <text x={cx} y={cy+12} textAnchor="middle" fill="#6a6a7e" fontSize={size*0.07} style={{pointerEvents:"none"}}>NOMS</text>
      </svg>
    );
  }

  return(
    <div>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:16,fontWeight:900,color:"#d4a843",letterSpacing:"0.06em"}}>AWARDS PROJECTIONS</div>
          <div style={{fontSize:11,color:"#6a6a7e",marginTop:2}}>
            Based on Gold Derby odds · {activeCategories.length} categories active
            {oddsUpdated&&<span> · Updated {new Date(oddsUpdated).toLocaleDateString()}</span>}
          </div>
        </div>
        <a href="https://www.goldderby.com/odds/combined-odds/oscars-nominations-2027/" target="_blank" rel="noopener noreferrer"
          style={{fontSize:11,color:"#6a6a7e",textDecoration:"none",border:"1px solid #222233",padding:"4px 10px",borderRadius:4}}>Gold Derby ↗</a>
      </div>

      {/* Stat cards */}
      <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
        {topAwardFilm&&(()=>{
          const fc=EXEC_COLORS[topAwardFilm.team]||"#d4a843";
          return(
            <div style={{...statCard,borderColor:fc+"50"}}>
              <div style={{fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:"#6a6a7e",marginBottom:6}}>Top Award Film</div>
              <div style={{fontSize:13,fontWeight:700,color:"#e8e8f0",lineHeight:1.2,marginBottom:4}}>{topAwardFilm.title}</div>
              <div style={{fontSize:11,fontFamily:"monospace",color:fc}}>${topAwardFilm.proj}M projected · {topAwardFilm.team}</div>
            </div>
          );
        })()}
        {darkHorse&&(
          <div style={{...statCard,borderColor:"rgba(248,113,113,0.3)"}}>
            <div style={{fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:"#6a6a7e",marginBottom:6}}>Dark Horse (Off Slate)</div>
            <div style={{fontSize:13,fontWeight:700,color:"#e8e8f0",lineHeight:1.2,marginBottom:4}}>{darkHorse.film_title}</div>
            <div style={{fontSize:11,color:"#f87171",fontFamily:"monospace"}}>{darkHorse.nom_odds.toFixed(1)}% nom odds · undrafted</div>
          </div>
        )}
        {biggestWinner&&(
          <div style={{...statCard,borderColor:(EXEC_COLORS[biggestWinner.team]||"#6a6a7e")+"50"}}>
            <div style={{fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:"#6a6a7e",marginBottom:6}}>Biggest Awards Winner</div>
            <div style={{fontSize:13,fontWeight:700,color:EXEC_COLORS[biggestWinner.team]||"#e8e8f0",lineHeight:1.2,marginBottom:4}}>{DISPLAY[biggestWinner.team]||biggestWinner.team}</div>
            <div style={{fontSize:11,color:"#d4a843",fontFamily:"monospace"}}>{biggestWinner.nomCount} noms + {biggestWinner.winCount} wins projected</div>
          </div>
        )}
      </div>

      {/* Projected Standings */}
      <div style={card}>
        <div style={{fontSize:12,fontWeight:700,color:"#d4a843",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>Projected Final Standings</div>
        <div style={{fontSize:10,color:"#6a6a7e",marginBottom:14}}>Current BO + unspent budget + projected award earnings. Bar width is proportional.</div>
        {projectedStandings.map((e,i)=>{
          const color=EXEC_COLORS[e.team]||"#6a6a7e";
          const isLeading=i===0;
          const barPct=(e.total/maxTotal)*100;
          return(
            <div key={e.team} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color:isLeading?"#d4a843":"#6a6a7e",minWidth:20}}>{i+1}</span>
                  <span style={{fontWeight:700,fontSize:13,color}}>{DISPLAY[e.team]||e.team}</span>
                  {isLeading&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:3,background:"rgba(212,168,67,0.1)",color:"#d4a843",border:"1px solid rgba(212,168,67,0.2)",letterSpacing:"0.08em"}}>PROJECTED WINNER</span>}
                </div>
                <span style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:"#e8e8f0"}}>{fmtAward(e.total)}</span>
              </div>
              <div style={{height:8,background:"#1a1a28",borderRadius:4,overflow:"hidden",display:"flex",width:animatedBars?`${barPct}%`:"0%",transition:"width 1s cubic-bezier(0.4,0,0.2,1)"}}>
                <div style={{width:`${e.total>0?(e.bo/e.total)*100:0}%`,background:color,opacity:0.9}}/>
                <div style={{width:`${e.total>0?(e.unspent/e.total)*100:0}%`,background:color,opacity:0.4}}/>
                <div style={{width:`${e.total>0?(e.awardProj/e.total)*100:0}%`,background:"#d4a843",opacity:0.7}}/>
              </div>
              <div style={{display:"flex",gap:12,marginTop:4,fontSize:9,color:"#6a6a7e",fontFamily:"monospace"}}>
                <span>BO {fmtAward(e.bo)}</span>
                <span>+ Budget {fmtAward(e.unspent)}</span>
                <span style={{color:"#d4a843"}}>+ Awards ${(e.awardProj/1e6).toFixed(0)}M</span>
              </div>
            </div>
          );
        })}
        <div style={{fontSize:9,color:"#3a3a50",marginTop:8,fontFamily:"monospace"}}>Gold = projected awards · Faded = unspent budget · Solid = box office · Bar width = proportional</div>
      </div>

      {/* Nomination Share Donut */}
      <div style={card}>
        <div style={{fontSize:12,fontWeight:700,color:"#d4a843",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:14}}>Projected Nomination Share</div>
        <div style={{display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
          <DonutChart data={nomPieData} total={totalNoms} size={130}/>
          <div style={{flex:1,minWidth:120}}>
            {nomPieData.map(d=>(
              <div key={d.team} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,
                opacity:hoveredSlice===null||hoveredSlice===d.team?1:0.3,
                transition:"opacity 0.25s ease"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:d.color,flexShrink:0}}/>
                <span style={{fontSize:13,fontWeight:600,color:d.color,minWidth:60}}>{DISPLAY[d.team]||d.team}</span>
                <div style={{flex:1,height:4,background:"#1a1a28",borderRadius:2,overflow:"hidden"}}>
                  <div style={{
                    height:"100%",
                    width:animatedBars?`${totalNoms>0?(d.noms/totalNoms)*100:0}%`:"0%",
                    background:d.color,borderRadius:2,
                    transform:hoveredSlice===d.team?"scaleX(1.02)":"scaleX(1)",
                    transformOrigin:"left",
                    transition:"width 1s cubic-bezier(0.4,0,0.2,1), transform 0.2s ease, opacity 0.25s ease",
                    opacity:hoveredSlice===null||hoveredSlice===d.team?1:0.3
                  }}/>
                </div>
                <span style={{fontFamily:"monospace",fontSize:11,color:"#e8e8f0",minWidth:24,textAlign:"right"}}>{d.noms}</span>
                <span style={{fontFamily:"monospace",fontSize:10,color:"#6a6a7e",minWidth:36,textAlign:"right"}}>{totalNoms>0?((d.noms/totalNoms)*100).toFixed(0):0}%</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Award Earnings by Exec */}
      <div style={card}>
        <div style={{fontSize:12,fontWeight:700,color:"#d4a843",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>Award Earnings by Exec</div>
        <div style={{fontSize:10,color:"#6a6a7e",marginBottom:14}}>Films in top nomination slots earn $25M. The #1 ranked film earns an additional win bonus.</div>
        {Object.entries(execAwardData).sort((a,b)=>b[1].projected-a[1].projected).map(([team,data])=>(
          <div key={team} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #1a1a28"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:data.films.length>0?10:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:EXEC_COLORS[team]||"#6a6a7e",flexShrink:0}}/>
                <span style={{fontWeight:700,color:EXEC_COLORS[team]||"#e8e8f0",fontSize:14}}>{DISPLAY[team]||team}</span>
                <span style={{fontSize:10,color:"#6a6a7e",fontFamily:"monospace"}}>{data.nomCount} nom{data.nomCount!==1?"s":""} · {data.winCount} win{data.winCount!==1?"s":""}</span>
              </div>
              <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                <span style={{fontFamily:"monospace",color:"#d4a843",fontSize:16,fontWeight:700}}>${data.projected}M</span>
                {data.projected>0&&<span style={{fontSize:10,color:"#4a4a5e",fontFamily:"monospace"}}>EV ${data.ev.toFixed(0)}M</span>}
              </div>
            </div>
            {data.films.sort((a,b)=>b.projected-a.projected).map(f=>(
              <div key={f.title} style={{display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"center",padding:"6px 0",borderBottom:"1px solid #0a0a12"}}>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#e8e8f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.title}</div>
                  <div style={{fontSize:10,color:"#6a6a7e",marginTop:2,fontFamily:"monospace",display:"flex",gap:8}}>
                    {f.nomCount>0&&<span style={{color:"#9a9ab0"}}>{f.nomCount} nom{f.nomCount!==1?"s":""}</span>}
                    {f.winCount>0&&<span style={{color:"#d4a843"}}>{f.winCount} win{f.winCount!==1?"s":""}</span>}
                  </div>
                </div>
                <div style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:"#d4a843",whiteSpace:"nowrap"}}>${f.projected}M</div>
              </div>
            ))}
            {data.films.length===0&&<div style={{fontSize:11,color:"#3a3a50",fontStyle:"italic",marginTop:4}}>No films currently in top nomination slots</div>}
          </div>
        ))}
      </div>

      {/* Category Breakdown */}
      <div style={card}>
        <div style={{fontSize:12,fontWeight:700,color:"#d4a843",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>Category Breakdown</div>
        <div style={{fontSize:10,color:"#6a6a7e",marginBottom:14}}>All films at their true Gold Derby global rank. Undrafted films shown dimmed.</div>
        {activeCategories.map(cat=>{
          const catConfig=OSCAR_CATEGORIES.find(c=>c.key===cat);
          const slots=catConfig?catConfig.slots:5;
          const allCatOdds=odds.filter(o=>o.category===cat).sort((a,b)=>b.nom_odds-a.nom_odds);
          const topSlotFilms=allCatOdds.slice(0,slots);
          // Use case-insensitive lookup for slate matching
          const slateInTop=topSlotFilms.filter(o=>!!findSlateFilm(o.film_title));
          if(!slateInTop.length) return null;
          const isActorCat=actorCats.has(cat);
          const isDirCat=cat===directorCat;
          return(
            <div key={cat} style={{marginBottom:24}}>
              <div style={{fontSize:11,fontWeight:700,color:"#9a9ab0",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>{cat}</span>
                <span style={{fontSize:9,color:"#4a4a5e",fontWeight:400}}>Top {slots} slots</span>
              </div>
              {topSlotFilms.map((f,idx)=>{
                const isDrafted=!!findSlateFilm(f.film_title);
                const film=findSlateFilm(f.film_title);
                const execColor=film?EXEC_COLORS[film.team]||"#6a6a7e":"#6a6a7e";
                const isGlobalWinner=idx===0;
                const performers=isActorCat?(performerMap[cat]||[]).filter(p=>p.film===f.film_title):[];
                // For director cat: strip director surname from "Surname FilmTitle"
                // by finding the longest slate film name that appears at end of film_title
                let displayTitle=f.film_title;
                if(isDirCat){
                  // Try to find a slate film whose title is contained at end of film_title
                  const lower=f.film_title.toLowerCase();
                  let bestMatch="";
                  (films||[]).forEach(sl=>{
                    const slLower=sl.title.toLowerCase();
                    if(lower.endsWith(slLower)&&sl.title.length>bestMatch.length) bestMatch=sl.title;
                  });
                  // Also try odds titles from Best Picture as reference
                  if(!bestMatch){
                    const words=f.film_title.split(" ");
                    // Skip first word (director surname) and use rest as film title
                    if(words.length>1) bestMatch=words.slice(1).join(" ");
                  }
                  if(bestMatch) displayTitle=bestMatch;
                }
                return(
                  <div key={f.film_title+idx} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,opacity:isDrafted?1:0.4}}>
                    <div style={{width:22,fontFamily:"monospace",fontSize:10,
                      color:isGlobalWinner&&isDrafted?"#d4a843":isDrafted?"#6a6a7e":"#3a3a50",
                      flexShrink:0,textAlign:"right",fontWeight:isGlobalWinner&&isDrafted?700:400}}>
                      #{idx+1}
                    </div>
                    <div style={{width:180,flexShrink:0}}>
                      {performers.length>0
                        ?performers.map((p,pi)=>(
                            <div key={pi} style={{fontSize:12,color:isDrafted?"#e8e8f0":"#6a6a7e",fontWeight:isGlobalWinner&&isDrafted?700:400,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.performer}</div>
                          ))
                        :<div style={{fontSize:12,color:isDrafted?"#e8e8f0":"#6a6a7e",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:isGlobalWinner&&isDrafted?700:400}}>{displayTitle}</div>
                      }
                      {isDrafted&&film?(
                        <div style={{fontSize:9,color:execColor,marginTop:1,fontWeight:600,display:"flex",gap:4}}>
                          <span>{DISPLAY[film.team]||film.team}</span>
                          {performers.length>0&&<span style={{color:"#4a4a5e"}}>· {f.film_title}</span>}
                        </div>
                      ):(
                        <div style={{fontSize:9,color:"#3a3a50",marginTop:1,display:"flex",gap:4}}>
                          <span>undrafted</span>
                          {performers.length>0&&<span>· {f.film_title}</span>}
                        </div>
                      )}
                    </div>
                    <AnimBar pct={f.nom_odds} color={isDrafted?execColor:"#2a2a3a"} height={6} glow={isGlobalWinner&&isDrafted}/>
                    <div style={{fontFamily:"monospace",fontSize:11,
                      color:isGlobalWinner&&isDrafted?"#d4a843":isDrafted?"#6a6a7e":"#3a3a50",
                      width:40,textAlign:"right",flexShrink:0}}>
                      {f.nom_odds.toFixed(0)}%
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── RULES ──────────────────
function Rules({leagueCtx}){
  const l=leagueCtx||{};
  const budget=l.budget||500;
  const minBid=l.min_bid||10;
  const maxBid=l.max_bid?`$${l.max_bid}M`:'no maximum';
  const numPlayers=l.num_players||5;
  const nomBonus=l.oscar_nom_bonus||25;
  const winBonus=l.oscar_win_bonus||25;
  const bpBonus=l.bp_bonus||50;
  const festivals=l.festival_picks!==false;
  const rules=[
    ["film",`${numPlayers} Studio Execs, each with a $${budget}M budget`],
    ["dollar",`Minimum bid of $${minBid}M per film${l.max_bid?`, maximum $${l.max_bid}M`:''}`],
    ["calendar",`Eligibility: ${ELIGIBILITY_START} to ${ELIGIBILITY_END}`],
    ["trophy",`Oscar nominations worth $${nomBonus}M each`],
    ["trophy2",`Oscar wins worth an additional $${winBonus}M each`],
    ["crown",`Best Picture win worth an additional $${bpBonus}M`],
    ["chart","Box office numbers updated daily"],
    ["dollar2","Unused budget added to final total"],
    ...(festivals?[["dice","Festival futures can be drafted sight-unseen"]]:[] ),
    ["ban","Voided films: money lost, no refund"],
    ["lock","No changes after the draft — no redrafting at any point"],
  ];
  return(
    <div style={{background:"#111119",border:"1px solid #222233",borderRadius:10,padding:"16px 14px"}}>
      <div style={{fontSize:16,fontWeight:900,color:"#d4a843",letterSpacing:"0.06em",marginBottom:14}}>GAME RULES</div>
      {rules.map(([icon,text],i)=>(
        <div key={i} style={{padding:"9px 0",fontSize:13,color:"#9a9ab0",lineHeight:1.5,borderBottom:i<rules.length-1?"1px solid #14141e":"none",display:"flex",gap:10,alignItems:"flex-start"}}>
          <span style={{flexShrink:0,display:"inline-flex",alignItems:"center",marginTop:1}}>
          {icon==="film"&&<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="3" width="12" height="8" rx="1" stroke="currentColor" strokeWidth="1.2"/><path d="M1 5h12M1 9h12M4 3v2M4 9v2M10 3v2M10 9v2" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
          {icon==="dollar"&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M4 3.5a2 2 0 0 1 4 0c0 1.1-.9 1.5-2 2s-2 .9-2 2a2 2 0 0 0 4 0" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
          {icon==="dollar2"&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M4 3.5a2 2 0 0 1 4 0c0 1.1-.9 1.5-2 2s-2 .9-2 2a2 2 0 0 0 4 0" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
          {icon==="calendar"&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="2.5" width="10" height="8.5" rx="1" stroke="currentColor" strokeWidth="1.2"/><path d="M1 5.5h10M4 1.5v2M8 1.5v2" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
          {icon==="trophy"&&<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 2h6v5a3 3 0 0 1-6 0V2z" stroke="currentColor" strokeWidth="1.2"/><path d="M4 4H2a1.5 1.5 0 0 0 0 3h2M10 4h2a1.5 1.5 0 0 1 0 3h-2M7 10v2M4.5 12h5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
          {icon==="trophy2"&&<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 2h6v5a3 3 0 0 1-6 0V2z" stroke="currentColor" strokeWidth="1.2"/><path d="M4 4H2a1.5 1.5 0 0 0 0 3h2M10 4h2a1.5 1.5 0 0 1 0 3h-2M7 10v2M4.5 12h5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
          {icon==="crown"&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 9h10M1 9l2-5 3 3 3-5 2 7H1z" stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round"/></svg>}
          {icon==="chart"&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 10h10M3 7v3M6 4v6M9 1v9" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
          {icon==="dice"&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" strokeWidth="1.2"/><circle cx="4" cy="4" r="0.8" fill="currentColor"/><circle cx="8" cy="8" r="0.8" fill="currentColor"/><circle cx="6" cy="6" r="0.8" fill="currentColor"/></svg>}
          {icon==="ban"&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" strokeWidth="1.2"/><path d="M2.5 2.5l7 7" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
          {icon==="lock"&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="5.5" width="8" height="5.5" rx="1" stroke="currentColor" strokeWidth="1.2"/><path d="M4 5.5V4a2 2 0 0 1 4 0v1.5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
        </span>
          <span>{text}</span>
        </div>
      ))}
    </div>
  );
}


// ─── MANAGE TAB (Admin only) ──────────────────────────────────────────────────
function ManageTab({leagueContext, members, userMembership}){
  const l = leagueContext || {};
  const[draftStatus,setDraftStatus]=React.useState(l.draft_status||'open');
  const[editingRules,setEditingRules]=React.useState(false);
  const[saving,setSaving]=React.useState(false);
  const[rulesMsg,setRulesMsg]=React.useState(null);
  const[rules,setRules]=React.useState({
    budget: l.budget||500,
    min_bid: l.min_bid||10,
    max_bid: l.max_bid||'',
    oscar_nom_bonus: l.oscar_nom_bonus||25,
    oscar_win_bonus: l.oscar_win_bonus||25,
    bp_bonus: l.bp_bonus||50,
    festival_picks: l.festival_picks!==false,
    num_players: l.num_players||5,
  });

  async function toggleDraft(){
    const newStatus = draftStatus==='open'?'locked':'open';
    const session=getSession();
    const res=await fetch(`${SUPABASE_URL}/rest/v1/leagues?id=eq.${LEAGUE_UUID}`,{
      method:'PATCH',
      headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${session?.access_token||SUPABASE_ANON_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({draft_status:newStatus})
    });
    if(res.ok) setDraftStatus(newStatus);
  }

  async function saveRules(){
    setSaving(true); setRulesMsg(null);
    const session=getSession();
    const payload={
      budget:Number(rules.budget)||500,
      min_bid:Number(rules.min_bid)||10,
      max_bid:rules.max_bid?Number(rules.max_bid):null,
      oscar_nom_bonus:Number(rules.oscar_nom_bonus)||25,
      oscar_win_bonus:Number(rules.oscar_win_bonus)||25,
      bp_bonus:Number(rules.bp_bonus)||50,
      festival_picks:rules.festival_picks,
      num_players:Number(rules.num_players)||5,
    };
    const res=await fetch(`${SUPABASE_URL}/rest/v1/leagues?id=eq.${LEAGUE_UUID}`,{
      method:'PATCH',
      headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${session?.access_token||SUPABASE_ANON_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(payload)
    });
    setSaving(false);
    if(res.ok){
      setRulesMsg({text:'Rules saved. Reload to see updated Rules tab.',error:false});
      setEditingRules(false);
    } else {
      setRulesMsg({text:'Failed to save rules.',error:true});
    }
  }

  async function copyInviteCode(){
    const inviteUrl=`${window.location.origin}/join?code=${l.invite_code}`;
    try{await navigator.clipboard.writeText(inviteUrl);}catch(e){}
  }

  const inp={width:'100%',padding:'8px 10px',background:'#1a1a28',border:'1px solid #222233',borderRadius:6,color:'#e8e8f0',fontSize:13,fontFamily:"'Helvetica Neue',sans-serif",outline:'none',boxSizing:'border-box'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>

      {/* Draft Control */}
      <div style={{background:'#111119',border:'1px solid #222233',borderRadius:10,padding:'16px 14px'}}>
        <div style={{fontSize:12,fontWeight:700,color:'#d4a843',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:14}}>Draft Control</div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:'#e8e8f0',marginBottom:4}}>Draft Status</div>
            <div style={{fontSize:12,color:'#6a6a7e'}}>
              Currently: <span style={{color:draftStatus==='open'?'#34d399':'#f59e0b',fontWeight:700}}>{draftStatus==='open'?'Open':'Locked'}</span>
            </div>
          </div>
          <button onClick={toggleDraft} style={{padding:'8px 18px',borderRadius:7,border:`1px solid ${draftStatus==='open'?'rgba(239,68,68,0.3)':'rgba(52,211,153,0.3)'}`,background:draftStatus==='open'?'rgba(239,68,68,0.1)':'rgba(52,211,153,0.1)',color:draftStatus==='open'?'#ef4444':'#34d399',fontSize:12,fontWeight:700,cursor:'pointer'}}>
            {draftStatus==='open'?'Lock Draft':'Reopen Draft'}
          </button>
        </div>
      </div>

      {/* League Rules */}
      <div style={{background:'#111119',border:'1px solid #222233',borderRadius:10,padding:'16px 14px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:'#d4a843',letterSpacing:'0.08em',textTransform:'uppercase'}}>League Rules</div>
          {!editingRules
            ?<button onClick={()=>setEditingRules(true)} style={{padding:'5px 14px',borderRadius:6,border:'1px solid #222233',background:'transparent',color:'#6a6a7e',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:5}}><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8 2l2 2-6 6H2V8l6-6z" stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round"/></svg> Edit Rules</button>
            :<div style={{display:'flex',gap:6}}>
              <button onClick={()=>{setEditingRules(false);setRulesMsg(null);}} style={{padding:'5px 12px',borderRadius:6,border:'1px solid #222233',background:'transparent',color:'#6a6a7e',fontSize:11,cursor:'pointer'}}>Cancel</button>
              <button onClick={saveRules} disabled={saving} style={{padding:'5px 14px',borderRadius:6,border:'none',background:'#d4a843',color:'#0d0d14',fontSize:11,fontWeight:700,cursor:'pointer',opacity:saving?0.7:1}}>{saving?'Saving...':'Save Rules'}</button>
            </div>
          }
        </div>
        {rulesMsg&&<div style={{padding:'8px 12px',borderRadius:6,fontSize:12,marginBottom:12,background:rulesMsg.error?'rgba(239,68,68,0.08)':'rgba(52,211,153,0.08)',border:`1px solid ${rulesMsg.error?'rgba(239,68,68,0.2)':'rgba(52,211,153,0.2)'}`,color:rulesMsg.error?'#ef4444':'#34d399'}}>{rulesMsg.text}</div>}
        {!editingRules?(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:10}}>
            {[
              ['Budget',`$${rules.budget}M`],
              ['Players',rules.num_players],
              ['Min Bid',`$${rules.min_bid}M`],
              ['Max Bid',rules.max_bid?`$${rules.max_bid}M`:'Uncapped'],
              ['Nom Bonus',`$${rules.oscar_nom_bonus}M`],
              ['Win Bonus',`$${rules.oscar_win_bonus}M`],
              ['Best Picture',`$${rules.bp_bonus}M`],
              ['Festivals',rules.festival_picks?'On':'Off'],
            ].map(([label,val])=>(
              <div key={label} style={{background:'#1a1a28',borderRadius:7,padding:'10px 12px'}}>
                <div style={{fontFamily:'monospace',fontSize:14,fontWeight:700,color:'#d4a843'}}>{val}</div>
                <div style={{fontSize:9,color:'#6a6a7e',textTransform:'uppercase',letterSpacing:'0.1em',marginTop:2}}>{label}</div>
              </div>
            ))}
          </div>
        ):(
          <div>
            <div style={{fontSize:10,color:'#f59e0b',padding:'8px 12px',background:'rgba(245,158,11,0.06)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:6,marginBottom:12}}>
               Changing rules mid-season affects all players. Make sure everyone is aware before saving.
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[
                ['Budget ($M)','budget'],['Min Bid ($M)','min_bid'],
                ['Max Bid ($M, blank=uncapped)','max_bid'],['Nom Bonus ($M)','oscar_nom_bonus'],
                ['Win Bonus ($M)','oscar_win_bonus'],['Best Picture Bonus ($M)','bp_bonus'],
                ['Number of Players','num_players'],
              ].map(([label,key])=>(
                <div key={key}>
                  <label style={{display:'block',fontSize:9,color:'#6a6a7e',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:5}}>{label}</label>
                  <input type="number" style={inp} value={rules[key]} onChange={e=>setRules(r=>({...r,[key]:e.target.value}))} min="0"/>
                </div>
              ))}
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0'}}>
                <label style={{fontSize:13,color:'#e8e8f0',flex:1}}>Festival Futures</label>
                <button onClick={()=>setRules(r=>({...r,festival_picks:!r.festival_picks}))}
                  style={{width:40,height:22,borderRadius:11,border:'none',background:rules.festival_picks?'#34d399':'#3a3a50',cursor:'pointer',position:'relative',transition:'background 0.2s',flexShrink:0}}>
                  <div style={{width:16,height:16,borderRadius:'50%',background:'#fff',position:'absolute',top:3,left:rules.festival_picks?20:3,transition:'left 0.2s'}}/>
                </button>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Members */}
      <div style={{background:'#111119',border:'1px solid #222233',borderRadius:10,padding:'16px 14px'}}>
        <div style={{fontSize:12,fontWeight:700,color:'#d4a843',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:14}}>Members ({members.length})</div>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {members.map((m,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:'#1a1a28',borderRadius:6}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:'#e8e8f0'}}>{m.profile?.display_name||m.profile?.email||'—'}</div>
                <div style={{fontSize:11,color:'#6a6a7e',fontFamily:'monospace'}}>{m.team_name||'—'}</div>
              </div>
              <div style={{padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',
                background:m.role==='admin'?'rgba(212,168,67,0.1)':'rgba(52,211,153,0.1)',
                color:m.role==='admin'?'#d4a843':'#34d399',
                border:`1px solid ${m.role==='admin'?'rgba(212,168,67,0.25)':'rgba(52,211,153,0.25)'}`
              }}>{m.role}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Invite */}
      <div style={{background:'#111119',border:'1px solid #222233',borderRadius:10,padding:'16px 14px'}}>
        <div style={{fontSize:12,fontWeight:700,color:'#d4a843',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:10}}>Invite Link</div>
        <div style={{display:'flex',alignItems:'center',gap:12,background:'#1a1a28',borderRadius:7,padding:'14px 16px'}}>
          <div style={{fontFamily:'monospace',fontSize:13,color:'#d4a843',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{window.location.origin}/join?code={l.invite_code||'—'}</div>
          <button onClick={copyInviteCode} style={{padding:'6px 12px',borderRadius:5,border:'1px solid #222233',background:'transparent',color:'#6a6a7e',fontSize:11,cursor:'pointer',fontFamily:'monospace',flexShrink:0}}>Copy</button>
        </div>
      </div>

    </div>
  );
}


function SettingsPanel({membership, leagueCtx, onClose}){
  const session = getSession();
  const[tab,setTab]=useState("profile");
  const[displayName,setDisplayName]=useState(session?.user?.user_metadata?.display_name||"");
  const[studioName,setStudioName]=useState(membership?.team_name||"");
  const[email,setEmail]=useState(session?.user?.email||"");
  const[currentPw,setCurrentPw]=useState("");
  const[newPw,setNewPw]=useState("");
  const[confirmPw,setConfirmPw]=useState("");
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState(null); // {text, error}
  const[showDeleteConfirm,setShowDeleteConfirm]=useState(false);
  const[deleteInput,setDeleteInput]=useState("");

  async function sbAuth(endpoint, body) {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/${endpoint}`, {
      method:"PUT",
      headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":`Bearer ${session?.access_token}`,"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    return {ok:res.ok, data:await res.json()};
  }

  async function saveProfile(){
    setSaving(true); setMsg(null);
    const updates = {};
    if(displayName.trim()) updates.data = {display_name:displayName.trim()};
    if(email.trim()!==session?.user?.email) updates.email = email.trim();
    const {ok,data} = await sbAuth("user", updates);
    if(ok){
      // Update local session
      const s = JSON.parse(localStorage.getItem('sef_session')||'{}');
      s.user = {...s.user,...data};
      localStorage.setItem('sef_session', JSON.stringify(s));
      setMsg({text:"Profile updated",error:false});
    } else {
      setMsg({text:data.msg||"Update failed",error:true});
    }
    setSaving(false);
  }

  async function savePassword(){
    setSaving(true); setMsg(null);
    if(!newPw||newPw.length<8){setMsg({text:"Password must be at least 8 characters",error:true});setSaving(false);return;}
    if(newPw!==confirmPw){setMsg({text:"Passwords do not match",error:true});setSaving(false);return;}
    const {ok,data} = await sbAuth("user", {password:newPw});
    if(ok){
      setMsg({text:"Password updated",error:false});
      setCurrentPw(""); setNewPw(""); setConfirmPw("");
    } else {
      setMsg({text:data.msg||"Failed to update password",error:true});
    }
    setSaving(false);
  }

  async function saveStudioName(){
    setSaving(true); setMsg(null);
    if(!session||!membership) return;
    const res = await fetch(`${SUPABASE_URL}/rest/v1/league_members?league_id=eq.${leagueCtx?.id}&user_id=eq.${session.user.id}`, {
      method:"PATCH",
      headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":`Bearer ${session.access_token}`,"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify({team_name:studioName.trim()})
    });
    if(res.ok){setMsg({text:"Studio name updated — reload to see changes",error:false});}
    else{setMsg({text:"Failed to update studio name",error:true});}
    setSaving(false);
  }

  async function deleteAccount(){
    // Sign out and remove session — full deletion requires admin API
    localStorage.removeItem('sef_session');
    window.location.href='/';
  }

  const inputStyle={width:"100%",padding:"10px 13px",background:"#1a1a28",border:"1px solid #222233",borderRadius:7,color:"#e8e8f0",fontSize:13,fontFamily:"'Helvetica Neue',sans-serif",outline:"none",boxSizing:"border-box"};
  const labelStyle={display:"block",fontSize:10,fontWeight:600,color:"#6a6a7e",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6};
  const sectionStyle={marginBottom:20};
  const btnStyle={padding:"9px 18px",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer",border:"none",fontFamily:"inherit"};

  return(
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{marginLeft:"auto",width:"100%",maxWidth:380,height:"100%",background:"#12121c",borderLeft:"1px solid #222233",display:"flex",flexDirection:"column",animation:"slideInRight 0.25s ease-out"}}>
        {/* Header */}
        <div style={{padding:"16px 20px",borderBottom:"1px solid #222233",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:"0.06em",color:"#d4a843"}}>SETTINGS</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#6a6a7e",fontSize:20,cursor:"pointer",padding:"4px 8px",lineHeight:1,borderRadius:4}}
            onMouseEnter={e=>e.currentTarget.style.color="#e8e8f0"}
            onMouseLeave={e=>e.currentTarget.style.color="#6a6a7e"}>✕</button>
        </div>
        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid #222233",flexShrink:0}}>
          {["profile","password","league"].map(t=>(
            <button key={t} onClick={()=>{setTab(t);setMsg(null);}} style={{flex:1,padding:"10px 6px",background:"none",border:"none",borderBottom:`2px solid ${tab===t?"#d4a843":"transparent"}`,color:tab===t?"#d4a843":"#6a6a7e",fontSize:12,fontWeight:600,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"inherit",transition:"all 0.15s"}}>
              {t==="league"?"League":t.charAt(0).toUpperCase()+t.slice(1)}
            </button>
          ))}
        </div>
        {/* Content */}
        <div style={{flex:1,overflowY:"auto",padding:"20px"}}>
          {msg&&<div style={{padding:"10px 14px",borderRadius:7,fontSize:13,marginBottom:16,background:msg.error?"rgba(239,68,68,0.08)":"rgba(52,211,153,0.08)",border:`1px solid ${msg.error?"rgba(239,68,68,0.2)":"rgba(52,211,153,0.2)"}`,color:msg.error?"#ef4444":"#34d399"}}>{msg.text}</div>}

          {tab==="profile"&&(
            <div>
              <div style={sectionStyle}>
                <label style={labelStyle}>Display Name</label>
                <input style={inputStyle} value={displayName} onChange={e=>setDisplayName(e.target.value)} placeholder="Your name"/>
              </div>
              <div style={sectionStyle}>
                <label style={labelStyle}>Email Address</label>
                <input style={inputStyle} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com"/>
                {email!==session?.user?.email&&<div style={{fontSize:10,color:"#f59e0b",marginTop:4}}>You'll receive a confirmation email to verify the change.</div>}
              </div>
              <button onClick={saveProfile} disabled={saving} style={{...btnStyle,background:"#d4a843",color:"#0d0d14",width:"100%",opacity:saving?0.7:1}}>
                {saving?"Saving...":"Save Profile"}
              </button>

            </div>
          )}

          {tab==="password"&&(
            <div>
              <div style={{fontSize:12,color:"#6a6a7e",marginBottom:20,lineHeight:1.6}}>Choose a strong password. You'll stay logged in on this device after changing it.</div>
              <div style={sectionStyle}>
                <label style={labelStyle}>New Password</label>
                <input style={inputStyle} type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="At least 8 characters" autocomplete="new-password"/>
              </div>
              <div style={sectionStyle}>
                <label style={labelStyle}>Confirm New Password</label>
                <input style={inputStyle} type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} placeholder="Same password again" autocomplete="new-password"/>
              </div>
              <button onClick={savePassword} disabled={saving} style={{...btnStyle,background:"#d4a843",color:"#0d0d14",width:"100%",opacity:saving?0.7:1}}>
                {saving?"Updating...":"Update Password"}
              </button>
            </div>
          )}

          {tab==="league"&&(
            <div>
              <div style={{fontSize:12,color:"#6a6a7e",marginBottom:20,lineHeight:1.6}}>Your studio name is how you appear in <strong style={{color:"#e8e8f0"}}>{leagueCtx?.name||"this league"}</strong>. Each league can have a different studio name.</div>
              <div style={sectionStyle}>
                <label style={labelStyle}>Studio Name</label>
                <input style={inputStyle} value={studioName} onChange={e=>setStudioName(e.target.value)} placeholder="e.g. Sunset Pictures"/>
                <div style={{fontSize:10,color:"#6a6a7e",marginTop:5}}>This updates how you appear in standings and on your slate.</div>
              </div>
              <button onClick={saveStudioName} disabled={saving} style={{...btnStyle,background:"#d4a843",color:"#0d0d14",width:"100%",opacity:saving?0.7:1,marginBottom:24}}>
                {saving?"Saving...":"Save Studio Name"}
              </button>
              <div style={{paddingTop:20,borderTop:"1px solid #222233",marginBottom:20}}>
                <label style={labelStyle}>Default Tab</label>
                <select style={{...inputStyle,cursor:"pointer"}} value={localStorage.getItem('sef_default_tab')||'standings'} onChange={e=>{localStorage.setItem('sef_default_tab',e.target.value);setMsg({text:"Default tab saved",error:false});}}>
                  {["standings","timeline","purchase","trends","awards","rules"].map(t=>(
                    <option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>
                  ))}
                </select>
                <div style={{fontSize:10,color:"#6a6a7e",marginTop:5}}>Which tab you land on when opening a league.</div>
              </div>
              <div style={{paddingTop:20,borderTop:"1px solid #222233"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#ef4444",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>Danger Zone</div>
                <div style={{fontSize:12,color:"#6a6a7e",marginBottom:12,lineHeight:1.5}}>Deleting your account will sign you out permanently. To fully remove your data, contact us via Help & About.</div>
                {!showDeleteConfirm?(
                  <button onClick={()=>setShowDeleteConfirm(true)} style={{...btnStyle,background:"rgba(239,68,68,0.08)",color:"#ef4444",border:"1px solid rgba(239,68,68,0.2)",width:"100%"}}>Delete Account</button>
                ):(
                  <div style={{padding:14,background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8}}>
                    <div style={{fontSize:12,color:"#ef4444",marginBottom:10,lineHeight:1.5}}>Are you sure? This action signs you out. Contact us to fully remove your account.</div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>setShowDeleteConfirm(false)} style={{...btnStyle,flex:1,background:"transparent",border:"1px solid #222233",color:"#6a6a7e"}}>Cancel</button>
                      <button onClick={deleteAccount} style={{...btnStyle,flex:1,background:"#ef4444",color:"#fff"}}>Confirm</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
        {/* Footer */}
        <div style={{padding:"14px 20px",borderTop:"1px solid #222233",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <a href="/about" style={{fontSize:12,color:"#6a6a7e",textDecoration:"none"}}
            onMouseEnter={e=>e.currentTarget.style.color="#e8e8f0"}
            onMouseLeave={e=>e.currentTarget.style.color="#6a6a7e"}>Help & About</a>
          <span style={{fontSize:11,color:"#3a3a50",fontFamily:"monospace"}}>SEF 2026</span>
        </div>
      </div>
      <style>{`@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
