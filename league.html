<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>League — Studio Exec Fantasy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;
  --bg2:#12121c;
  --bg3:#1a1a28;
  --border:#222233;
  --text:#e8e8f0;
  --muted:#6a6a7e;
  --gold:#f5c842;
  --green:#34d399;
  --red:#ef4444;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;min-height:100vh}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:50;height:60px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(13,13,20,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:16px}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.12em;color:var(--gold);text-decoration:none}
.header-sep{color:var(--border);font-size:18px}
.header-league{font-size:14px;font-weight:500;color:var(--text);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:12px}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 32px;background:var(--bg2)}
.tab{padding:14px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--gold)}
.tab.admin-tab{color:rgba(245,200,66,0.5)}
.tab.admin-tab.active{color:var(--gold)}

/* ── CONTENT ── */
.content{max-width:1100px;margin:0 auto;padding:40px 32px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;border:none;font-family:'Inter',sans-serif;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--gold);color:#0d0d14;font-weight:600}
.btn-primary:hover{background:#f7d060}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:#3a3a50}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}
.btn-danger{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.btn-danger:hover{background:rgba(239,68,68,0.18)}
.btn-sm{padding:5px 12px;font-size:12px}

/* ── LOADING ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:0.12em;color:var(--gold);opacity:0.5}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
.spinner-sm{display:inline-block;width:13px;height:13px;border:2px solid rgba(13,13,20,0.3);border-top-color:#0d0d14;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LEAGUE OVERVIEW ── */
.league-hero{margin-bottom:40px}
.league-hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:24px}
.league-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:0.06em;line-height:1}
.league-meta{font-size:13px;color:var(--muted);margin-top:6px;display:flex;gap:16px;flex-wrap:wrap}
.league-meta span{display:flex;align-items:center;gap:5px}
.meta-dot{width:5px;height:5px;border-radius:50%;background:var(--muted)}
.draft-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.08em}
.draft-badge.open{background:rgba(52,211,153,0.1);color:var(--green);border:1px solid rgba(52,211,153,0.25)}
.draft-badge.open::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.draft-badge.locked{background:rgba(106,106,126,0.1);color:var(--muted);border:1px solid var(--border)}
.draft-badge.locked::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--muted)}
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.rule-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.rule-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;margin-bottom:3px}
.rule-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}

/* ── MEMBERS TABLE ── */
.members-table{width:100%;border-collapse:collapse;margin-top:0}
.members-table th{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.members-table td{padding:13px 14px;border-bottom:1px solid rgba(34,34,51,0.5);font-size:13px}
.members-table tr:last-child td{border-bottom:none}
.members-table tr:hover td{background:rgba(26,26,40,0.5)}
.role-chip{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.role-chip.admin{background:rgba(245,200,66,0.1);color:var(--gold)}
.role-chip.player{background:rgba(52,211,153,0.1);color:var(--green)}
.role-chip.guest{background:rgba(106,106,126,0.1);color:var(--muted)}

/* ── ADMIN PANEL ── */
.admin-section{margin-bottom:36px}
.admin-section-title{font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.admin-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px}
.admin-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid rgba(34,34,51,0.5)}
.admin-row:last-child{border-bottom:none;padding-bottom:0}
.admin-row:first-child{padding-top:0}
.admin-row-info h4{font-size:14px;font-weight:500;margin-bottom:3px}
.admin-row-info p{font-size:12px;color:var(--muted)}
.danger-zone{border-color:rgba(239,68,68,0.2);background:rgba(239,68,68,0.03)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:460px;position:relative;transform:translateY(16px);transition:transform 0.2s;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:5px 9px;border-radius:5px}
.modal-close:hover{color:var(--text);background:var(--bg3)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.06em;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px}
.form-input{width:100%;padding:10px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;transition:border-color 0.15s;outline:none}
.form-input:focus{border-color:rgba(245,200,66,0.4)}
.form-input::placeholder{color:var(--muted)}
.form-error{font-size:12px;color:var(--red);margin-top:14px;padding:10px 13px;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:6px;display:none}
.form-error.show{display:block}
.form-success{font-size:13px;color:var(--green);margin-top:14px;padding:10px 13px;background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.2);border-radius:6px;display:none}
.form-success.show{display:block}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* ── INVITE BOX ── */
.invite-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.invite-code{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;letter-spacing:0.18em;color:var(--gold)}
.invite-url{font-size:12px;color:var(--muted);margin-top:8px;font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:12px;padding:5px 10px;border-radius:5px;transition:all 0.15s;font-family:'Inter',sans-serif}
.copy-btn:hover{color:var(--text);border-color:#3a3a50}

/* ── PLACEHOLDER (until full game view is ported) ── */
.coming-soon{text-align:center;padding:80px 32px}
.coming-soon-icon{font-size:48px;margin-bottom:20px}
.coming-soon h2{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:0.06em;margin-bottom:10px}
.coming-soon p{font-size:14px;color:var(--muted);max-width:380px;margin:0 auto}

@media(max-width:600px){
  header{padding:0 16px}
  .tabs{padding:0 16px;overflow-x:auto}
  .content{padding:28px 16px}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="header-logo" href="/landing.html">SEF</a>
    <div class="header-sep">/</div>
    <div class="header-league" id="headerLeagueName">Loading…</div>
  </div>
  <div class="header-right">
    <a class="btn btn-ghost btn-sm" href="/dashboard.html">← My Leagues</a>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign out</button>
  </div>
</header>

<div id="tabsBar" style="display:none">
  <div class="tabs" id="tabsContainer"></div>
</div>

<div id="pageContent">
  <div class="loading-screen">
    <div class="loading-logo">SEF</div>
    <div class="spinner"></div>
  </div>
</div>

<!-- ADD MEMBER MODAL -->
<div class="modal-overlay" id="addMemberModal" onclick="handleOverlayClick(event,'addMemberModal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('addMemberModal')">✕</button>
    <div class="modal-title">ADD MEMBER</div>
    <div class="modal-sub">Add a player to this league by their email address.</div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="add-email" placeholder="player@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Team Name</label>
      <input class="form-input" type="text" id="add-teamname" placeholder="How they'll appear on the leaderboard"/>
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select class="form-input" id="add-role">
        <option value="player">Player</option>
        <option value="guest">Guest (view only)</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-error" id="addMemberError"></div>
    <div class="form-success" id="addMemberSuccess"></div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('addMemberModal')">Cancel</button>
      <button class="btn btn-primary" id="addMemberBtn" onclick="handleAddMember()">Add Member</button>
    </div>
  </div>
</div>

<!-- EDIT MEMBER MODAL -->
<div class="modal-overlay" id="editMemberModal" onclick="handleOverlayClick(event,'editMemberModal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('editMemberModal')">✕</button>
    <div class="modal-title">EDIT MEMBER</div>
    <div class="modal-sub" id="editMemberSub">Update role or team name.</div>
    <input type="hidden" id="edit-member-id"/>
    <div class="form-group">
      <label class="form-label">Team Name</label>
      <input class="form-input" type="text" id="edit-teamname"/>
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select class="form-input" id="edit-role">
        <option value="player">Player</option>
        <option value="guest">Guest (view only)</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-error" id="editMemberError"></div>
    <div class="form-success" id="editMemberSuccess"></div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('editMemberModal')">Cancel</button>
      <button class="btn btn-primary" id="editMemberBtn" onclick="handleEditMember()">Save Changes</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://fymkwkbatklfynnhxrsf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5bWt3a2JhdGtsZnlubmh4cnNmIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDc5MjM5OSwiZXhwIjoyMDk2MzY4Mzk5fQ.kduv2_XfCxTa2xJHSLn86KkPmYmpmgX9nrb98GHD39s";

let currentSession = null;
let currentProfile = null;
let currentLeague = null;
let currentMembership = null;
let leagueMembers = [];
let activeTab = 'overview';

// ── AUTH ──────────────────────────────────────────────────────────────────────
function getSession() {
  try {
    const raw = localStorage.getItem('sef_session');
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s.access_token) return null;
    if (s.expires_at && new Date(s.expires_at * 1000) < new Date()) {
      localStorage.removeItem('sef_session');
      return null;
    }
    return s;
  } catch(e) { return null; }
}

function signOut() {
  localStorage.removeItem('sef_session');
  window.location.href = '/landing.html';
}

async function sbFetch(path, options = {}) {
  const session = getSession();
  const headers = {
    'apikey': SUPABASE_ANON_KEY,
    'Content-Type': 'application/json',
    ...(session ? { 'Authorization': `Bearer ${session.access_token}` } : {}),
    ...(options.headers || {})
  };
  const res = await fetch(`${SUPABASE_URL}${path}`, { ...options, headers });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch(e) { data = text; }
  return { ok: res.ok, status: res.status, data };
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  currentSession = getSession();
  if (!currentSession) { window.location.href = '/landing.html'; return; }

  const leagueId = new URLSearchParams(window.location.search).get('id');
  if (!leagueId) { window.location.href = '/dashboard.html'; return; }

  const userId = currentSession.user?.id;

  // Load profile
  const { ok: pOk, data: pData } = await sbFetch(`/rest/v1/profiles?id=eq.${userId}&select=*`);
  if (!pOk || !pData?.length) { signOut(); return; }
  currentProfile = pData[0];

  // Load league
  const { ok: lOk, data: lData } = await sbFetch(`/rest/v1/leagues?id=eq.${leagueId}&select=*`);
  if (!lOk || !lData?.length) { window.location.href = '/dashboard.html'; return; }
  currentLeague = lData[0];
  document.title = `${currentLeague.name} — SEF`;
  document.getElementById('headerLeagueName').textContent = currentLeague.name;

  // Load membership
  const { data: mData } = await sbFetch(
    `/rest/v1/league_members?league_id=eq.${leagueId}&user_id=eq.${userId}&select=*`
  );
  currentMembership = mData?.[0] || null;

  // If not a member, show access denied
  if (!currentMembership) {
    renderAccessDenied();
    return;
  }

  // Load all members
  await loadMembers();
  renderTabs();
  renderTab('overview');
}

async function loadMembers() {
  const { ok, data } = await sbFetch(
    `/rest/v1/league_members?league_id=eq.${currentLeague.id}&select=*,profile:profiles(id,display_name,email)&order=joined_at.asc`
  );
  if (ok && Array.isArray(data)) leagueMembers = data;
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function renderTabs() {
  const isAdmin = currentMembership?.role === 'admin';
  const tabs = [
    { id: 'overview', label: 'Overview' },
    { id: 'standings', label: 'Standings' },
    { id: 'slate', label: 'My Slate' },
    ...(isAdmin ? [{ id: 'manage', label: '⚙ Manage', admin: true }] : [])
  ];

  document.getElementById('tabsContainer').innerHTML = tabs.map(t => `
    <button class="tab${t.admin ? ' admin-tab' : ''}${activeTab===t.id?' active':''}"
      onclick="renderTab('${t.id}')">${t.label}</button>
  `).join('');

  document.getElementById('tabsBar').style.display = 'block';
}

function renderTab(tabId) {
  activeTab = tabId;
  renderTabs();
  switch(tabId) {
    case 'overview': renderOverview(); break;
    case 'standings': renderStandings(); break;
    case 'slate': renderSlate(); break;
    case 'manage': renderManage(); break;
  }
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────────
function renderOverview() {
  const l = currentLeague;
  const isAdmin = currentMembership?.role === 'admin';
  document.getElementById('pageContent').innerHTML = `
    <div class="content">
      <div class="league-hero">
        <div class="league-hero-top">
          <div>
            <div class="league-title">${escHtml(l.name)}</div>
            <div class="league-meta">
              <span>Season ${escHtml(l.season)}</span>
              <span><div class="meta-dot"></div>${leagueMembers.length} member${leagueMembers.length!==1?'s':''}</span>
              <span><div class="meta-dot"></div>$${l.budget}M budget</span>
            </div>
          </div>
          <div class="draft-badge ${l.draft_status}">${l.draft_status === 'open' ? 'Draft Open' : 'Draft Locked'}</div>
        </div>

        ${l.description ? `<p style="font-size:14px;color:var(--muted);margin-bottom:24px">${escHtml(l.description)}</p>` : ''}

        <div class="rules-grid">
          <div class="rule-card"><div class="rule-val">$${l.budget}M</div><div class="rule-label">Starting Budget</div></div>
          <div class="rule-card"><div class="rule-val">${l.num_players}</div><div class="rule-label">Max Players</div></div>
          <div class="rule-card"><div class="rule-val">$${l.min_bid}M</div><div class="rule-label">Min Bid</div></div>
          <div class="rule-card"><div class="rule-val">${l.max_bid ? '$'+l.max_bid+'M' : '—'}</div><div class="rule-label">Max Bid</div></div>
          <div class="rule-card"><div class="rule-val">$${l.oscar_nom_bonus}M</div><div class="rule-label">Nom Bonus</div></div>
          <div class="rule-card"><div class="rule-val">$${l.oscar_win_bonus}M</div><div class="rule-label">Win Bonus</div></div>
          <div class="rule-card"><div class="rule-val">$${l.bp_bonus}M</div><div class="rule-label">Best Picture</div></div>
          <div class="rule-card"><div class="rule-val">${l.festival_picks ? 'On' : 'Off'}</div><div class="rule-label">Festival Picks</div></div>
        </div>
      </div>

      <!-- Members -->
      <div style="margin-bottom:32px">
        <div style="font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:16px">Members</div>
        <table class="members-table">
          <thead><tr><th>Name</th><th>Team</th><th>Role</th><th>Joined</th></tr></thead>
          <tbody>
            ${leagueMembers.map(m => `
              <tr>
                <td>${escHtml(m.profile?.display_name || m.profile?.email || '—')}</td>
                <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${escHtml(m.team_name||'—')}</td>
                <td><span class="role-chip ${m.role}">${m.role}</span></td>
                <td style="color:var(--muted);font-size:12px">${formatDate(m.joined_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      ${isAdmin ? `
        <div style="margin-bottom:32px">
          <div style="font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Invite Link</div>
          <div class="invite-box">
            <div>
              <div class="invite-code">${escHtml(l.invite_code)}</div>
              <div class="invite-url">${window.location.origin}/dashboard.html → Join with code: ${escHtml(l.invite_code)}</div>
            </div>
            <button class="copy-btn" onclick="copyText('${escHtml(l.invite_code)}', this)">Copy Code</button>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

// ── STANDINGS / SLATE PLACEHOLDERS ───────────────────────────────────────────
function renderStandings() {
  document.getElementById('pageContent').innerHTML = `
    <div class="content">
      <div class="coming-soon">
        <div class="coming-soon-icon">🏆</div>
        <h2>STANDINGS</h2>
        <p>Full live standings, box office race, and POI charts are coming in the next phase. For now, view the current season at the link below.</p>

// ── DRAFT STATUS TOGGLE ───────────────────────────────────────────────────────
async function toggleDraftStatus() {
  const newStatus = currentLeague.draft_status === 'open' ? 'locked' : 'open';
  const { ok } = await sbFetch(`/rest/v1/leagues?id=eq.${currentLeague.id}`, {
    method: 'PATCH',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify({ draft_status: newStatus })
  });
  if (ok) {
    currentLeague.draft_status = newStatus;
    renderManage();
    renderTabs();
  }
}

// ── ADD MEMBER ────────────────────────────────────────────────────────────────
async function handleAddMember() {
  const errEl = document.getElementById('addMemberError');
  const sucEl = document.getElementById('addMemberSuccess');
  errEl.classList.remove('show'); sucEl.classList.remove('show');

  const email = document.getElementById('add-email').value.trim().toLowerCase();
  const teamName = document.getElementById('add-teamname').value.trim();
  const role = document.getElementById('add-role').value;

  if (!email || !teamName) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.classList.add('show'); return;
  }

  setLoading('addMemberBtn', true, 'Add Member');

  // Look up user by email
  const { ok, data } = await sbFetch(`/rest/v1/profiles?email=eq.${encodeURIComponent(email)}&select=id,display_name`);
  if (!ok || !data?.length) {
    setLoading('addMemberBtn', false, 'Add Member');
    errEl.textContent = 'No account found with that email. They need to sign up first.';
    errEl.classList.add('show'); return;
  }

  const profile = data[0];
  const { ok: joinOk, data: joinData } = await sbFetch('/rest/v1/league_members', {
    method: 'POST',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify({ league_id: currentLeague.id, user_id: profile.id, role, team_name: teamName })
  });

  setLoading('addMemberBtn', false, 'Add Member');

  if (!joinOk) {
    errEl.textContent = joinData?.message?.includes('duplicate') ? 'This person is already in the league.' : 'Failed to add member.';
    errEl.classList.add('show'); return;
  }

  sucEl.textContent = `✓ ${profile.display_name || email} added as ${role}.`;
  sucEl.classList.add('show');
  await loadMembers();
  setTimeout(() => { closeModal('addMemberModal'); renderManage(); }, 900);
}

// ── EDIT MEMBER ───────────────────────────────────────────────────────────────
function openEditMember(member) {
  document.getElementById('edit-member-id').value = member.id;
  document.getElementById('edit-teamname').value = member.team_name || '';
  document.getElementById('edit-role').value = member.role;
  document.getElementById('editMemberSub').textContent =
    `Editing ${member.profile?.display_name || member.profile?.email || 'member'}`;
  document.getElementById('editMemberError').classList.remove('show');
  document.getElementById('editMemberSuccess').classList.remove('show');
  openModal('editMemberModal');
}

async function handleEditMember() {
  const errEl = document.getElementById('editMemberError');
  const sucEl = document.getElementById('editMemberSuccess');
  errEl.classList.remove('show'); sucEl.classList.remove('show');

  const memberId = document.getElementById('edit-member-id').value;
  const teamName = document.getElementById('edit-teamname').value.trim();
  const role = document.getElementById('edit-role').value;

  if (!teamName) {
    errEl.textContent = 'Team name cannot be empty.';
    errEl.classList.add('show'); return;
  }

  setLoading('editMemberBtn', true, 'Save Changes');
  const { ok } = await sbFetch(`/rest/v1/league_members?id=eq.${memberId}`, {
    method: 'PATCH',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify({ team_name: teamName, role })
  });
  setLoading('editMemberBtn', false, 'Save Changes');

  if (!ok) { errEl.textContent = 'Failed to update member.'; errEl.classList.add('show'); return; }

  sucEl.textContent = '✓ Updated.';
  sucEl.classList.add('show');
  await loadMembers();
  setTimeout(() => { closeModal('editMemberModal'); renderManage(); }, 700);
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }
function handleOverlayClick(e,id) { if(e.target===document.getElementById(id)) closeModal(id); }
document.addEventListener('keydown', e => { if(e.key==='Escape') ['addMemberModal','editMemberModal'].forEach(closeModal); });

function setLoading(btnId, loading, label) {
  const btn = document.getElementById(btnId);
  if(!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner-sm"></span>Please wait…' : label;
}

function escHtml(str) {
  if(!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  if(!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  catch(e) { return '—'; }
}

async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1800);
  } catch(e) {}
}
