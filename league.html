// Parses a simple weekly snapshot tab.
// Expects: row 0 = headers (Week | exec names...), rows 1+ = data
// Works for both BO (large dollar numbers) and POI (percentage numbers).
function parseWeeklyTab(text){
  if(!text||text.trim().startsWith('<')) return null;
  const rows=parseCSV(text);
  if(!rows||rows.length<2) return null;

  // Flexible name matching — handles "Brandon", "BRANDON", "bb", "BB" etc.
  const nameMap={
    brandon:"BRANDON",rafa:"RAFA",kai:"KAI",patrick:"PATRICK",bb:"BB",
    "b.b":"BB","b.bennett":"BRANDON","brendan":"BRANDON",
  };

  const hRow=rows[0].map(c=>(c||"").trim().toLowerCase());
  // Find the week column — first column labelled "week", "date", or "w/e"
  const weekCol=hRow.findIndex(c=>c==="week"||c==="date"||c==="w/e"||c.startsWith("week"));
  if(weekCol<0) return null;

  // Map exec columns by matching header to exec names
  const execCols={};
  hRow.forEach((c,j)=>{
    if(j===weekCol) return;
    // Strip trailing decorations like "_bo", "_poi", "%", parenthetical etc.
    const base=c.replace(/[\s_]*(bo|poi|roi|cumul.*|total|%|\(.*\))$/,"").trim();
    if(nameMap[base]) execCols[nameMap[base]]=j;
  });

  if(Object.keys(execCols).length<2) return null;

  const result=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!r||!r[weekCol]) continue;
    const label=(r[weekCol]||"").trim();
    if(!label||label.toLowerCase()==="week"||label.toLowerCase()==="total") continue;
    const row={week:label};
    Object.entries(execCols).forEach(([team,col])=>{
      const raw=(r[col]||"").replace(/[$,%\s]/g,"").trim();
      row[team]=parseFloat(raw)||0;
    });
    result.push(row);
  }
  return result.length>0?result:null;
}

    const cells=r.map(c=>(c||"").trim().toLowerCase());
    const wIdx=cells.findIndex(c=>c==="week"||c==="date"||c.startsWith("week"));
    if(wIdx<0) continue;
    // Check if this row also has exec names
    let found=0;
    cells.forEach((c,j)=>{
      const base=c.replace(/[_\s]*(bo|poi|cumulative|total|%|roi)$/i,"").trim();
      if(nameMap[base]){found++;}
    });
    if(found>=2){headerRow=i;weekCol=wIdx;break;}
  }

  if(headerRow<0) return null;

  const hRow=rows[headerRow].map(c=>(c||"").trim().toLowerCase());

  // Map exec BO columns and POI columns
  hRow.forEach((c,j)=>{
    if(j===weekCol) return;
    const isPOI=c.includes("poi")||c.includes("%")||c.includes("roi");
    const base=c.replace(/[_\s]*(bo|poi|cumulative|total|%|roi|earned)$/i,"").trim();
    const team=nameMap[base];
    if(!team) return;
    if(isPOI) poiCol[team]=j;
    else boCol[team]=j;
  });

  // If we only found BO columns (no POI), that's fine — POI will fall back
  const hasBO=Object.keys(boCol).length>=2;
  if(!hasBO) return null;

  const weeklyBO=[];
  const weeklyPOI=[];

  for(let i=headerRow+1;i<rows.length;i++){
    const r=rows[i];
    if(!r||!r[weekCol]) continue;
    const label=(r[weekCol]||"").trim();
    if(!label||label.toLowerCase()==="week"||label.toLowerCase()==="total") continue;

    const boRow={week:label};
    const poiRow={week:label};
    teams.forEach(t=>{
      boRow[t]=boCol[t]!==undefined?parseNum(r[boCol[t]]):0;
      poiRow[t]=poiCol[t]!==undefined?parseFloat((r[poiCol[t]]||"0").replace(/[$,%]/g,""))||0:0;
    });
    weeklyBO.push(boRow);
    if(Object.keys(poiCol).length>=2) weeklyPOI.push(poiRow);
  }

  if(weeklyBO.length===0) return null;
  return{weeklyBO, weeklyPOI:weeklyPOI.length>0?weeklyPOI:null};
}

// Weekly data comes entirely from fallback constants or the sheet.
// We do NOT compute it from live film data — the sheet is the source of truth.
// To add a new week: update FALLBACK_WEEKLY_BO and FALLBACK_WEEKLY_POI below.

function fmt(n){if(Math.abs(n)>=1e9)return"$"+(n/1e9).toFixed(2)+"B";if(Math.abs(n)>=1e6)return"$"+(n/1e6).toFixed(1)+"M";if(Math.abs(n)>=1e3)return"$"+(n/1e3).toFixed(0)+"K";return"$"+n.toLocaleString()}
function daysLeft(){return Math.ceil((OSCAR_DATE-new Date())/864e5)}
function parseCSV(t){const l=t.split("\n"),r=[];for(const line of l){const row=[];let f="",q=false;for(let j=0;j<line.length;j++){const c=line[j];if(q){if(c==='"'&&line[j+1]==='"'){f+='"';j++}else if(c==='"')q=false;else f+=c}else{if(c==='"')q=true;else if(c===','){row.push(f.trim());f=""}else f+=c}}row.push(f.trim());r.push(row)}return r}
function parseNum(v){if(!v)return 0;const n=parseInt(String(v).replace(/[$,]/g,""),10);return isNaN(n)?0:n}

function processCSV(rows){
  const films=[];
  const studioNames={...DEFAULT_STUDIOS};
  if(!rows||rows.length<2) return{films,studioNames};

  // ── Detect column positions from header row ───────────────────────────────
  // Use partial matching so "Domestic Box Office", "Dom BO", "BOX OFFICE" etc. all work
  const hRow=rows[0].map(c=>(c||"").trim().toUpperCase());

  let titleCol=-1,bidCol=-1,boCol=-1,teamCol=-1,releaseCol=-1,openCol=-1,lockedCol=-1,voidCol=-1;

  for(let j=0;j<hRow.length;j++){
    const h=hRow[j];
    if(titleCol<0 && (h.includes("FILM")||h.includes("TITLE")||h.includes("MOVIE"))) titleCol=j;
    if(bidCol<0   && (h.includes("BID")||h.includes("PURCHASE")||h.includes("PRICE")||h.includes("AMOUNT"))) bidCol=j;
    if(openCol<0  && (h.includes("OPENING")||h.includes("OPEN WEEKEND"))) openCol=j;
    // BO must NOT match the opening column — require "DOMESTIC"/"BOX OFFICE"/"GROSS" and not "OPENING"
    if(boCol<0    && !h.includes("OPENING") && (h.includes("DOMESTIC")||h.includes("BOX OFFICE")||(h==="BO")||(h==="DOM BO")||h.includes("GROSS"))) boCol=j;
    if(teamCol<0  && (h.includes("EXEC")||h.includes("TEAM")||h.includes("OWNER")||(h==="NAME"))) teamCol=j;
    if(releaseCol<0&&(h.includes("RELEASE")||h.includes("DATE"))) releaseCol=j;
    if(lockedCol<0&&(h==="LOCKED"||h==="LOCK"||h.includes("LOCK"))) lockedCol=j;
    if(voidCol<0&&(h==="VOID"||h==="FORFEIT"||h==="VOIDED")) voidCol=j;
  }

  // Log what we detected so mismatches are easy to spot in the browser console
  console.log("[processCSV] Detected columns →",
    `title:${titleCol}(${hRow[titleCol]||"?"})`,
    `bid:${bidCol}(${hRow[bidCol]||"?"})`,
    `open:${openCol}(${hRow[openCol]||"?"})`,
    `bo:${boCol}(${hRow[boCol]||"?"})`,
    `team:${teamCol}(${hRow[teamCol]||"?"})`,
    `release:${releaseCol}(${hRow[releaseCol]||"?"})`,
    `locked:${lockedCol}(${lockedCol>=0?hRow[lockedCol]:"not found"})`
  );

  // If header detection failed, warn loudly and use known positional fallback
  const fallback=(titleCol<0||bidCol<0||boCol<0||teamCol<0);
  if(fallback){
    console.warn("[processCSV] Header detection failed — falling back to fixed column positions. Sheet headers found:", hRow.slice(0,9).join(" | "));
    titleCol=0; bidCol=2; openCol=3; boCol=4; teamCol=5; releaseCol=6; lockedCol=8;
  }
  // lockedCol gets its own fallback even when other headers are found —
  // Column I (index 8) may have no header row entry if the script added it silently
  if(lockedCol<0) lockedCol=8;

  // ── Extract studio names from summary block (columns 7 + 11 historically) ─
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(!r||r.length<12)continue;
    const studio=r[7]||"";const owner=(r[11]||"").trim();
    if(studio&&owner&&EXEC_COLORS[owner.toUpperCase()]){studioNames[owner.toUpperCase()]=studio;}
    const ownerMap={"Brandon":"BRANDON","Rafa":"RAFA","Kai":"KAI","Patrick":"PATRICK","BB":"BB"};
    if(ownerMap[owner]&&studio){studioNames[ownerMap[owner]]=studio;}
  }

  // ── Parse film rows ───────────────────────────────────────────────────────
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(!r||r.length<3)continue;
    const title=(r[titleCol]||"").trim();
    const team=(r[teamCol]||"").trim().toUpperCase();
    if(!title||!team||!EXEC_COLORS[team])continue;
    if(title.toLowerCase().includes("remainder"))continue;
    if(title.toLowerCase().includes("godzilla x kong"))continue;
    const bid=parseNum(r[bidCol]);
    const boRaw=(r[boCol]||"").trim();
    const boNum=parseNum(boRaw);
    let status="upcoming",bo=0;

    // Normalize release date to YYYY-MM-DD regardless of sheet format
    const releaseRaw=(r[releaseCol]||"").trim();
    let release=null;
    if(releaseRaw&&releaseRaw!=="TBA"&&releaseRaw!=="No release date"&&releaseRaw!==""){
      if(/^\d{4}-\d{2}-\d{2}/.test(releaseRaw)){
        // Already ISO: 2026-05-22 — use as-is, no Date parsing needed (avoids UTC shift)
        release=releaseRaw.slice(0,10);
      } else {
        // Parse other formats: 5/22/2026, May 22 2026, etc.
        // Use UTC methods to avoid timezone-shifting the date
        const d=new Date(releaseRaw);
        if(!isNaN(d)) release=d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,"0")+"-"+String(d.getUTCDate()).padStart(2,"0");
      }
    }

    // Determine status from BO first, then from release date
    if(boNum>0){status="released";bo=boNum;}
    else if(!release){status="tba";}
    else{
      const releaseDate=parseReleaseDate(release);
      const today=new Date();today.setHours(0,0,0,0);
      if(releaseDate&&releaseDate<=today){status="released";}
      else{status="upcoming";}
    }
    // Opening weekend — "Film not released" / blank / non-numeric → 0
    const openRaw=openCol>=0?(r[openCol]||"").trim():"";
    const openNum=parseNum(openRaw);
    const opening=openNum>0?openNum:0;
    const locked=lockedCol>=0&&(r[lockedCol]||"").toString().trim().toUpperCase()==="LOCKED";
    const voided=voidCol>=0&&(r[voidCol]||"").toString().trim().toUpperCase()==="VOID";
    if(bid>0) films.push({title,bid,bo,opening,locked,voided,team,release,status});
  }

  // ── Sanity check: log per-exec BO totals so mismatches are obvious ────────
  const totals={};
  films.forEach(f=>{totals[f.team]=(totals[f.team]||0)+(f.bo||0);});
  console.log("[processCSV] BO totals per exec →", Object.entries(totals).map(([t,v])=>`${t}:${(v/1e6).toFixed(1)}M`).join("  "));
  const todayFilms=films.filter(f=>isReleaseDay(f.release));
  if(todayFilms.length>0) console.log("[processCSV] Today's releases →", todayFilms.map(f=>`${f.title}(release:${f.release})`).join("  "));
  else console.log("[processCSV] No films releasing today. TODAY="+TODAY);
  const releasedFilms=films.filter(f=>f.bo>0);
  console.log("[processCSV]", films.length, "films parsed. Released:", releasedFilms.length);
  console.log("[processCSV] Released films →", releasedFilms.map(f=>`${f.title}(${f.team}):${(f.bo/1e6).toFixed(1)}M`).join("  "));

  return{films,studioNames};
}

function Tooltip({x,y,children,visible}){if(!visible)return null;return(<div style={{position:"fixed",left:Math.min(x,typeof window!=="undefined"?window.innerWidth-220:500),top:Math.max(y-10,10),transform:"translateY(-100%)",background:"#1e1e2e",border:"1px solid #3a3a50",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#e8e8f0",pointerEvents:"none",zIndex:9999,boxShadow:"0 8px 30px rgba(0,0,0,0.6)",maxWidth:260}}>{children}</div>)}

// ─── INTERACTIVE LINE CHART — persistent data panel ──────────────────
// ─── USE IN VIEW — triggers when element scrolls into viewport ──────────────────
function useInView(threshold=0.25){
  const ref=useRef(null);
  const[inView,setInView]=useState(false);
  useEffect(()=>{
    const el=ref.current;
    if(!el)return;
    const obs=new IntersectionObserver(([entry])=>{
      if(entry.isIntersecting){setInView(true);obs.disconnect();}
    },{threshold});
    obs.observe(el);
    return()=>obs.disconnect();
  },[threshold]);
  return[ref,inView];
}


function LineChart({data,teams,valueFormatter,title}){
  const svgRef=useRef(null);
  const pathRefs=useRef({});
  const[lengths,setLengths]=useState({});
  const[hoverIdx,setHoverIdx]=useState(data.length-1);
  const[containerRef,inView]=useInView(0.2);
  const maxVal=Math.max(0.1,...data.flatMap(w=>teams.map(t=>w[t]||0)));
  const W=700,H=280,pL=70,pR=30,pT=20,pB=45;
  const pW=W-pL-pR,pH=H-pT-pB;
  const xStep=data.length>1?pW/(data.length-1):0;
  const getP=(i,t)=>({x:pL+i*xStep,y:pT+pH-((data[i][t]||0)/maxVal)*pH});
  const activeIdx=hoverIdx!==null?hoverIdx:data.length-1;
  const activeWeek=data[activeIdx];

  useEffect(()=>{
    const nl={};
    teams.forEach(team=>{const el=pathRefs.current[team];if(el)nl[team]=el.getTotalLength();});
    setLengths(nl);
  },[data,teams]);

  const handleInteraction=useCallback((clientX)=>{
    if(!svgRef.current)return;
    const rect=svgRef.current.getBoundingClientRect();
    const mx=((clientX-rect.left)/rect.width)*W;
    const idx=Math.round((mx-pL)/xStep);
    if(idx>=0&&idx<data.length)setHoverIdx(idx);
  },[data.length,xStep]);

  return(
    <div ref={containerRef}>
      <div style={{background:"#1a1a28",borderRadius:8,padding:"10px 14px",marginBottom:10}}>
        <div style={{fontWeight:700,color:"#d4a843",marginBottom:6,fontSize:12,display:"flex",justifyContent:"space-between"}}>
          <span>{activeWeek.week}</span>
          <span style={{color:"#4a4a5e",fontWeight:400,fontSize:10}}>hover chart to explore</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(115px, 1fr))",gap:"6px 14px"}}>
          {teams.map(t=>(
            <div key={t} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,paddingRight:6}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:EXEC_COLORS[t],flexShrink:0}}/>
              <span style={{color:"#8a8a9e"}}>{DISPLAY[t]}</span>
              <span style={{fontFamily:"monospace",color:EXEC_COLORS[t],fontWeight:600}}>{valueFormatter(activeWeek[t]||0)}</span>
            </div>
          ))}
        </div>
      </div>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",cursor:"crosshair",display:"block"}}
        onMouseMove={e=>handleInteraction(e.clientX)} onMouseLeave={()=>setHoverIdx(data.length-1)}
        onTouchMove={e=>{e.preventDefault();handleInteraction(e.touches[0].clientX)}} onTouchEnd={()=>setHoverIdx(data.length-1)}>
        {[0,.25,.5,.75,1].map(p=>{const y=pT+pH*(1-p);return(<g key={p}><line x1={pL} y1={y} x2={W-pR} y2={y} stroke="#1a1a28"/><text x={pL-6} y={y+4} fill="#4a4a5e" fontSize={9} textAnchor="end" fontFamily="monospace">{valueFormatter(maxVal*p)}</text></g>)})}
        {data.map((w,i)=>(<text key={i} x={pL+i*xStep} y={H-8} fill={i===activeIdx?"#d4a843":"#4a4a5e"} fontSize={9} textAnchor="middle" fontFamily="monospace" fontWeight={i===activeIdx?700:400}>{w.week}</text>))}
        <line x1={pL+activeIdx*xStep} y1={pT} x2={pL+activeIdx*xStep} y2={pT+pH} stroke="#d4a843" strokeWidth={1} strokeDasharray="4 3" opacity={0.4}/>
        {teams.map((team,ti)=>{
          const path=data.map((_,i)=>{const p=getP(i,team);return`${i===0?"M":"L"}${p.x},${p.y}`}).join(" ");
          const len=lengths[team]||0;
          const delay=ti*120;
          const animated=inView&&len>0;
          return(<path key={team} ref={el=>pathRefs.current[team]=el} d={path} fill="none"
            stroke={EXEC_COLORS[team]} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" opacity={0.8}
            strokeDasharray={len>0?len:undefined}
            strokeDashoffset={animated?undefined:len>0?len:undefined}
            style={animated?{animation:`drawLine 1.2s ease-out ${delay}ms both`,['--line-len']:len}:undefined}
          />);
        })}
        {teams.map(team=>data.map((_,i)=>{const p=getP(i,team);return<circle key={`${team}-${i}`} cx={p.x} cy={p.y} r={i===activeIdx?5:3} fill={EXEC_COLORS[team]} opacity={i===activeIdx?1:0.5}/>}))}
      </svg>
      <div style={{display:"flex",gap:14,justifyContent:"center",marginTop:8,flexWrap:"wrap"}}>
        {teams.map(t=>(<div key={t} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#8a8a9e"}}><div style={{width:12,height:3,background:EXEC_COLORS[t],borderRadius:2}}/>{DISPLAY[t]}</div>))}
      </div>
    </div>
  );
}

// ─── BAR CHART for total weekly BO ──────────────────
// ── Daily Box Office Chart ────────────────────────────────────────────────────
// Renders a bar-per-day chart for a single film, grouped by week.
// Weekend bars (Fri/Sat/Sun) are brighter; weekdays are muted.
// Data comes from the DAILY BO Google Sheet tab.
function DailyBOChart({dailyBO,anim}){
  const[containerRef,inView]=useInView(0.15);
  const[hoverIdx,setHoverIdx]=useState(null);
  const[animKey,setAnimKey]=useState(0);
  const sidebarRef=useRef(null);
  const[canScrollDown,setCanScrollDown]=useState(false);
  const lineRef=useRef(null);
  const[lineLen,setLineLen]=useState(0);
  const[isMobile,setIsMobile]=useState(()=>typeof window!=="undefined"&&window.innerWidth<600);

  useEffect(()=>{
    const check=()=>setIsMobile(window.innerWidth<600);
    window.addEventListener("resize",check);
    return()=>window.removeEventListener("resize",check);
  },[]);

  const allFilms=[...new Set(dailyBO.map(d=>d.film))];
  const[selectedFilm,setSelectedFilm]=useState(allFilms[0]||"");
  useEffect(()=>{if(allFilms.length&&!allFilms.includes(selectedFilm))setSelectedFilm(allFilms[0]);},[allFilms.join(",")]);

  useEffect(()=>{
    const el=sidebarRef.current;
    if(!el||isMobile) return;
    const check=()=>setCanScrollDown(el.scrollHeight>el.clientHeight&&el.scrollTop+el.clientHeight<el.scrollHeight-4);
    check();
    el.addEventListener("scroll",check);
    return()=>el.removeEventListener("scroll",check);
  },[allFilms.length,isMobile]);

  function selectFilm(film){setSelectedFilm(film);setHoverIdx(null);setAnimKey(k=>k+1);}

  const rows=dailyBO.filter(d=>d.film===selectedFilm);
  if(!rows.length) return null;

  const WEEKEND=new Set(["Friday","Saturday","Sunday"]);
  const isWeekend=d=>WEEKEND.has(d.dow);

  const W=620,H=200,pL=58,pR=12,pT=14,pB=40;
  const pW=W-pL-pR,pH=H-pT-pB;
  const maxDaily=Math.max(...rows.map(r=>r.daily),1);
  const px=i=>pL+i*(pW/(rows.length-1||1));
  const py=v=>pT+pH*(1-(v/maxDaily));
  const linePath=`M ${px(0).toFixed(1)},${py(rows[0].daily).toFixed(1)} `+rows.slice(1).map((r,i)=>`L ${px(i+1).toFixed(1)},${py(r.daily).toFixed(1)}`).join(" ");
  const areaPath=linePath+` L ${px(rows.length-1).toFixed(1)},${pT+pH} L ${px(0).toFixed(1)},${pT+pH} Z`;

  useEffect(()=>{
    if(lineRef.current){try{setLineLen(lineRef.current.getTotalLength());}catch(e){}}
  },[selectedFilm,rows.length,inView]);

  const shouldAnimate=inView&&lineLen>0;

  const xLabels=rows.map((r,i)=>{
    if(i===0||r.date.slice(5,7)!==rows[i-1].date.slice(5,7)){
      const p=r.date.split("-");
      return{x:px(i),label:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(p[1])-1]+" "+parseInt(p[2])};
    }
    return null;
  }).filter(Boolean);

  const hovered=hoverIdx!==null?rows[hoverIdx]:null;
  const filmSummary=allFilms.map(film=>{
    const fr=dailyBO.filter(d=>d.film===film);
    const total=fr.length?fr[fr.length-1].cumulative||fr.reduce((s,r)=>s+r.daily,0):0;
    return{film,total,days:fr.length};
  });
  const tooltipCols=[
    {label:"Date",     width:90, value:hovered?`${hovered.dow.slice(0,3)} ${hovered.date.slice(5).replace("-","/")}`:null, color:hovered&&isWeekend(hovered)?"#c084fc":"#9a9ab0"},
    {label:"Day",      width:38, value:hovered?`#${hovered.dayNum}`:null, color:"#9a9ab0"},
    {label:"Daily",    width:80, value:hovered?fmt(hovered.daily):null, color:"#e8e8f0"},
    {label:"Total",    width:84, value:hovered?fmt(hovered.cumulative):null, color:"#a855f7"},
    {label:"Theaters", width:60, value:hovered&&hovered.theaters>0?hovered.theaters.toLocaleString():null, color:"#4a4a5e"},
  ];

  const svgEl=(
    <div ref={containerRef}>
      <svg key={animKey} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block",overflow:"visible"}}>
        <defs>
          <linearGradient id="dailyAreaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#a855f7" stopOpacity="0.35"/>
            <stop offset="100%" stopColor="#a855f7" stopOpacity="0.02"/>
          </linearGradient>
          <clipPath id="dailyClip"><rect x={pL} y={pT} width={pW} height={pH}/></clipPath>
        </defs>
        {[0,0.25,0.5,0.75,1].map((f,i)=>{const y=pT+pH*(1-f);return(<g key={i}><line x1={pL} y1={y} x2={W-pR} y2={y} stroke="#1a1a28" strokeWidth={1}/><text x={pL-5} y={y+3} fill="#4a4a5e" fontSize={7} textAnchor="end" fontFamily="monospace">{f===0?"$0":fmt(Math.round(maxDaily*f))}</text></g>);})}
        {rows.map((r,i)=>{if(!isWeekend(r)||r.dow!=="Friday")return null;const x2=i+2<rows.length?px(i+2):px(rows.length-1);return<rect key={i} x={px(i)} y={pT} width={x2-px(i)} height={pH} fill="#a855f7" opacity={0.04}/>;})}
        <path d={areaPath} fill="url(#dailyAreaGrad)" clipPath="url(#dailyClip)" style={shouldAnimate?{animation:"clipGrow 1.1s ease-out both"}:{opacity:0}}/>
        <path ref={lineRef} d={linePath} fill="none" stroke="#a855f7" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" clipPath="url(#dailyClip)"
          strokeDasharray={lineLen>0?lineLen:undefined} strokeDashoffset={shouldAnimate?undefined:lineLen>0?lineLen:undefined}
          style={shouldAnimate?{animation:"drawLine 1.1s ease-out both",["--line-len"]:lineLen}:{}}/>
        {hoverIdx!==null&&<circle cx={px(hoverIdx)} cy={py(rows[hoverIdx].daily)} r={3.5} fill="#a855f7" stroke="#111119" strokeWidth={2}/>}
        {rows.map((r,i)=><rect key={i} x={i===0?pL:px(i)-(px(1)-px(0))/2} y={pT} width={pW/rows.length} height={pH} fill="transparent" style={{cursor:"crosshair"}} onMouseEnter={()=>setHoverIdx(i)} onMouseLeave={()=>setHoverIdx(null)}/>)}
        <line x1={pL} y1={pT+pH} x2={W-pR} y2={pT+pH} stroke="#2a2a3a" strokeWidth={1}/>
        {xLabels.map((l,i)=><text key={i} x={l.x} y={H-pB+12} fill="#4a4a5e" fontSize={7} textAnchor="middle" fontFamily="monospace">{l.label}</text>)}
      </svg>
    </div>
  );

  const tooltipEl=(

function WeeklyTotalBarChart({data,teams}){
  const svgRef=useRef(null);
  const[hoverIdx,setHoverIdx]=useState(data.length-1);
  const[containerRef,inView]=useInView(0.2);
  const totals=data.map(w=>{let s=0;teams.forEach(t=>s+=(w[t]||0));return s});
  const maxT=Math.max(1,...totals);
  const W=700,H=250,pL=70,pR=30,pT=20,pB=45;
  const pW=W-pL-pR,pH=H-pT-pB;
  const barW=Math.min(pW/data.length*0.7,60);
  const gap=(pW-barW*data.length)/(data.length+1);
  const activeIdx=hoverIdx!==null?hoverIdx:data.length-1;

  const handleInteraction=useCallback((clientX)=>{
    if(!svgRef.current)return;
    const rect=svgRef.current.getBoundingClientRect();
    const mx=((clientX-rect.left)/rect.width)*W;
    const idx=Math.round((mx-pL-gap)/(barW+gap));
    if(idx>=0&&idx<data.length)setHoverIdx(idx);
  },[data.length,barW,gap]);

  return(
    <div ref={containerRef}>
      <div style={{background:"#1a1a28",borderRadius:8,padding:"10px 14px",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <span style={{fontWeight:700,color:"#d4a843",fontSize:12}}>{data[activeIdx].week}</span>
            <span style={{fontFamily:"monospace",color:"#e8e8f0",fontWeight:700,fontSize:14,marginLeft:12}}>{fmt(totals[activeIdx])}</span>
          </div>
          {activeIdx>0&&<span style={{fontSize:11,fontFamily:"monospace",color:totals[activeIdx]>totals[activeIdx-1]?"#34d399":"#f87171"}}>
            {totals[activeIdx]>totals[activeIdx-1]?"+":""}{ fmt(totals[activeIdx]-totals[activeIdx-1]) } vs prev week
          </span>}
        </div>
      </div>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",cursor:"crosshair",display:"block",overflow:"visible"}}
        onMouseMove={e=>handleInteraction(e.clientX)} onMouseLeave={()=>setHoverIdx(data.length-1)}
        onTouchMove={e=>{e.preventDefault();handleInteraction(e.touches[0].clientX)}} onTouchEnd={()=>setHoverIdx(data.length-1)}>
        {[0,.25,.5,.75,1].map(p=>{const y=pT+pH*(1-p);return(<g key={p}><line x1={pL} y1={y} x2={W-pR} y2={y} stroke="#1a1a28"/><text x={pL-6} y={y+4} fill="#4a4a5e" fontSize={9} textAnchor="end" fontFamily="monospace">{fmt(maxT*p)}</text></g>)})}
        {/* Clipping rect so bars grow upward from baseline */}
        <defs>
          <clipPath id="barClip">
            <rect x={0} y={pT} width={W} height={pH}
              style={inView?{animation:'clipGrow 0.9s ease-out both'}:undefined}/>
          </clipPath>
        </defs>
        <g clipPath="url(#barClip)">
          {data.map((_,i)=>{
            const x=pL+gap+(barW+gap)*i;
            const isActive=i===activeIdx;
            let cumH=0;
            return(<g key={i}>
              {teams.map(t=>{const tH=(data[i][t]||0)/maxT*pH;const tY=pT+pH-cumH-tH;cumH+=tH;return<rect key={t} x={x} y={tY} width={barW} height={Math.max(tH,0)} rx={2} fill={EXEC_COLORS[t]} opacity={isActive?0.8:0.4}/>})}
            </g>);
          })}
        </g>
        {data.map((_,i)=>{
          const x=pL+gap+(barW+gap)*i;
          const isActive=i===activeIdx;
          return(<text key={i} x={x+barW/2} y={H-8} fill={isActive?"#d4a843":"#4a4a5e"} fontSize={9} textAnchor="middle" fontFamily="monospace" fontWeight={isActive?700:400}>{data[i].week}</text>);
        })}
      </svg>
    </div>
  );
}

// ─── BY PURCHASE PRICE TAB ──────────────────
function PurchasePriceTab({films,data,studioNames}){
  const[sortCol,setSortCol]=useState("bid");
  const[sortDir,setSortDir]=useState("desc");
  const[filterTeam,setFilterTeam]=useState("ALL");

  const allFilms=[...films].filter(f=>filterTeam==="ALL"||f.team===filterTeam);
  allFilms.sort((a,b)=>{
    let va,vb;
    if(sortCol==="bid"){va=a.bid;vb=b.bid;}
    else if(sortCol==="bo"){va=a.bo;vb=b.bo;}
    else if(sortCol==="opening"){va=a.opening||0;vb=b.opening||0;}
    else if(sortCol==="legs"){va=(a.opening>0&&a.bo>0)?a.bo/a.opening:0;vb=(b.opening>0&&b.bo>0)?b.bo/b.opening:0;}
    else if(sortCol==="roi"){va=a.bo>0?(a.bo/(a.bid*1e6))*100:0;vb=b.bo>0?(b.bo/(b.bid*1e6))*100:0;}
    else if(sortCol==="poi"){
      const pa=a.bo>0?a.bo/(a.bid*1e6):0;const pb=b.bo>0?b.bo/(b.bid*1e6):0;
      va=pa;vb=pb;
    }
    else if(sortCol==="date"){
      const da=a.release||"9999";const db=b.release||"9999";
      return sortDir==="asc"?da.localeCompare(db):db.localeCompare(da);
    }
    else if(sortCol==="title"){return sortDir==="asc"?a.title.localeCompare(b.title):b.title.localeCompare(a.title);}
    else{va=0;vb=0;}
    return sortDir==="asc"?va-vb:vb-va;
  });

  function toggleSort(col){
    if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");
    else{setSortCol(col);setSortDir("desc");}
  }
  function SortArrow({col}){if(sortCol!==col)return<span style={{color:"#2a2a3a",marginLeft:3}}>⇅</span>;return<span style={{color:"#d4a843",marginLeft:3}}>{sortDir==="desc"?"↓":"↑"}</span>;}

  const totalBid=allFilms.reduce((s,f)=>s+f.bid,0);
  const totalBO=allFilms.reduce((s,f)=>s+f.bo,0);
  const releasedCount=allFilms.filter(f=>f.bo>0).length;

  return(
    <div>
      {/* Summary bar */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{flex:1,background:"#111119",border:"1px solid #222233",borderRadius:8,padding:"10px 14px",minWidth:100}}>
          <div style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color:"#d4a843"}}>${totalBid}M</div>
          <div style={{fontSize:9,color:"#6a6a7e",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:2}}>Total Spent</div>
        </div>
        <div style={{flex:1,background:"#111119",border:"1px solid #222233",borderRadius:8,padding:"10px 14px",minWidth:100}}>
          <div style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color:"#34d399"}}>{fmt(totalBO)}</div>
          <div style={{fontSize:9,color:"#6a6a7e",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:2}}>Total BO</div>
        </div>
        <div style={{flex:1,background:"#111119",border:"1px solid #222233",borderRadius:8,padding:"10px 14px",minWidth:100}}>
          <div style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color:"#60a5fa"}}>{releasedCount}/{allFilms.length}</div>
          <div style={{fontSize:9,color:"#6a6a7e",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:2}}>Released</div>
        </div>
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:10,color:"#6a6a7e",textTransform:"uppercase",letterSpacing:"0.08em"}}>Filter:</span>
        {["ALL",...Object.keys(EXEC_COLORS)].map(t=>(
          <button key={t} onClick={()=>setFilterTeam(t)} style={{fontSize:10,padding:"4px 10px",borderRadius:5,border:`1px solid ${filterTeam===t?(t==="ALL"?"#d4a843":EXEC_COLORS[t]):"#2a2a3a"}`,background:filterTeam===t?(t==="ALL"?"#d4a84320":EXEC_COLORS[t]+"20"):"transparent",color:filterTeam===t?(t==="ALL"?"#d4a843":EXEC_COLORS[t]):"#6a6a7e",cursor:"pointer",fontWeight:700}}>
            {t==="ALL"?"All":DISPLAY[t]}
          </button>
        ))}
      </div>

      {/* Table */}
      <div style={{background:"#111119",border:"1px solid #222233",borderRadius:10,overflow:"hidden"}}>
        <div style={{background:"#0e0e16",borderBottom:"1px solid #222233",fontSize:9,color:"#6a6a7e",textTransform:"uppercase",letterSpacing:"0.08em"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 42px 22px 52px 65px 65px 42px",gap:0,padding:"9px 14px"}}>
            <button onClick={()=>toggleSort("title")} style={{background:"none",border:"none",color:"#6a6a7e",fontSize:9,textTransform:"uppercase",letterSpacing:"0.08em",cursor:"pointer",textAlign:"left",padding:0}}>Film<SortArrow col="title"/></button>
            <button onClick={()=>toggleSort("bid")} style={{background:"none",border:"none",color:"#6a6a7e",fontSize:9,textTransform:"uppercase",letterSpacing:"0.08em",cursor:"pointer",textAlign:"right",padding:0}}>$$<SortArrow col="bid"/></button>
            <div/>
            <button onClick={()=>toggleSort("date")} style={{background:"none",border:"none",color:"#6a6a7e",fontSize:9,textTransform:"uppercase",letterSpacing:"0.08em",cursor:"pointer",textAlign:"right",padding:0}}>Date<SortArrow col="date"/></button>
            <button onClick={()=>toggleSort("bo")} style={{background:"none",border:"none",color:"#6a6a7e",fontSize:9,textTransform:"uppercase",letterSpacing:"0.08em",cursor:"pointer",textAlign:"right",padding:0}}>Dom.BO<SortArrow col="bo"/></button>
            <button onClick={()=>toggleSort("poi")} style={{background:"none",border:"none",color:"#6a6a7e",fontSize:9,textTransform:"uppercase",letterSpacing:"0.08em",cursor:"pointer",textAlign:"right",padding:0}}>POI%<SortArrow col="poi"/></button>

          </div>
        </div>

        {/* Rows */}
        {allFilms.map((f,i)=>{
          const legs=(f.opening>0&&f.bo>0)?(f.bo/f.opening):null;
          const legsColor=legs===null?"#3a3a4e":legs>=3?"#34d399":legs>=2?"#86efac":legs>=1.5?"#fbbf24":"#f87171";

          return(
            <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 42px 22px 52px 65px 65px 42px",gap:0,padding:"9px 14px",borderBottom:"1px solid #0e0e16",alignItems:"center",opacity:f.locked?0.65:f.voided?0.7:1,background:f.voided?"rgba(239,68,68,0.04)":isReleaseDay(f.release)?"rgba(212,168,67,0.05)":i%2===0?"transparent":"#0a0a11"}}>
              {/* Title */}
              <div style={{minWidth:0,paddingRight:6}}>

                  {bomUrl(f.title)

              {/* Owner dot */}
              <div style={{display:"flex",justifyContent:"center"}}>

      try{
        const rows = await supabaseFetch("picks", `league_id=eq.${LEAGUE_ID}&order=release_date.asc.nullslast`);
        console.log("[supabase] picks rows:", rows.length);
        if(rows.length>0){
          const films = rows.map(r=>({
            title:    r.title,
            bid:      Number(r.bid),
            bo:       Number(r.bo),
            team:     r.team,
            release:  r.release_date || null,
            status:   r.status || (r.release_date ? "upcoming" : "tba"),
            locked:   !!r.locked,
            voided:   !!r.voided,
            opening:  Number(r.opening_weekend||0),
            bom_id:   r.bom_release_id||null,
            imdb_id:  r.imdb_id||null,
          }));
          setFilms(films);
          setLiveStatus("live");
          slateLoaded=true;
          console.log("[supabase] slate loaded successfully");
        }
      } catch(e){
        console.error("[supabase] picks fetch error:", e.message);
        for(let attempt=0;attempt<2;attempt++){
          try{
            const res=await fetch(SHEET_CSV_URL);
            const text=await res.text();
            const rows=parseCSV(text);
            const result=processCSV(rows);
            if(result.films.length>0){
              setFilms(result.films);
              setStudioNames(result.studioNames);
              setLiveStatus("live");
              slateLoaded=true;
              break;
            }
          }catch(e2){
            if(attempt===0) await new Promise(r=>setTimeout(r,1500));
          }
        }
      }
      if(!slateLoaded) setLiveStatus("fallback");

      // ── 2. Weekly BO snapshots — from Supabase ──────────────────────────
      try{
        const rows = await supabaseFetch("weekly_bo_snapshots", `league_id=eq.${LEAGUE_ID}&order=snapshot_date.asc`);
        if(rows.length>0){
          const byWeek={};
          rows.forEach(r=>{
            if(!byWeek[r.week_label]) byWeek[r.week_label]={week:r.week_label};
            byWeek[r.week_label][r.team]=Number(r.bo);
          });
          const parsed=Object.values(byWeek);
          if(parsed.length>0) setWeeklyBO(parsed);
        }
      }catch(e){ console.warn("[supabase] weekly_bo error:", e.message); }

      // ── 3. Weekly POI snapshots — from Supabase ──────────────────────────
      try{
        const rows = await supabaseFetch("weekly_poi_snapshots", `league_id=eq.${LEAGUE_ID}&order=snapshot_date.asc`);

// ─── RELEASE DAY SYSTEM ──────────────────────────────────────────────────────
function todayStr(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const TODAY=todayStr();

function isReleaseDay(releaseDate){
  if(!releaseDate) return false;
  return releaseDate.split('T')[0]===TODAY;
}

// Parse a YYYY-MM-DD string into a Date at local noon (avoids UTC midnight timezone shift)
// Use this everywhere we need a Date object from a release string
function parseReleaseDate(str){
  if(!str) return null;
  const s=str.split('T')[0];
  const parts=s.split('-');
  if(parts.length!==3) return null;
  // noon local time — safe from any timezone's UTC offset
  return new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]),12,0,0);
}

// ── Reusable countdown badge — shows "Today", "Tomorrow", "In Xd" when <7 days away ──
function CountdownBadge({release,status}){
  if(!release||status==="released"||status==="tba") return null;
  const releaseD=parseReleaseDate(release);
  if(!releaseD) return null;
  const days=Math.ceil((releaseD-new Date())/864e5);
  if(days<0||days>7) return null;
  const label=days===0?"Today":days===1?"Tomorrow":`In ${days}d`;
  return(
    <span style={{fontSize:8,background:"rgba(251,191,36,0.12)",color:"#fbbf24",padding:"1px 5px",borderRadius:3,fontWeight:700}}>
      {label}
    </span>
  );
}
function Sparkler({width=120,height=40,intervalMs=2800,particleCount=18}){
  const canvasRef=useRef(null);
  const particlesRef=useRef([]);
  const rafRef=useRef(null);
  const COLORS=['#d4a843','#fbbf24','#ffffff','#f59e0b','#fde68a','#fcd34d','#fffbeb'];

  function spawnBurst(canvas){
    const w=canvas.width,h=canvas.height;
    // Pick a random edge point as the launch origin
    const edge=Math.floor(Math.random()*4);
    let ox,oy,angleMin,angleMax;
    if(edge===0){ox=Math.random()*w;oy=0;angleMin=10;angleMax=170;}         // top
    else if(edge===1){ox=w;oy=Math.random()*h;angleMin=100;angleMax=260;}   // right
    else if(edge===2){ox=Math.random()*w;oy=h;angleMin=190;angleMax=350;}   // bottom
    else{ox=0;oy=Math.random()*h;angleMin=280;angleMax=440;}                // left (wraps)

    for(let i=0;i<particleCount;i++){
      const angle=((angleMin+Math.random()*(angleMax-angleMin))%360)*Math.PI/180;
      const speed=1.5+Math.random()*3.5;
      particlesRef.current.push({
        x:ox,y:oy,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed,
        alpha:1,
        life:1,
        decay:0.012+Math.random()*0.018,
        size:1.5+Math.random()*2.5,
        color:COLORS[Math.floor(Math.random()*COLORS.length)],
        gravity:0.06+Math.random()*0.04,
        trail:[],
      });
    }
  }

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas) return;
    const ctx=canvas.getContext('2d');
    canvas.width=canvas.offsetWidth||120;
    canvas.height=canvas.offsetHeight||40;

    // Initial burst immediately
    spawnBurst(canvas);

    // Recurring bursts
    const interval=setInterval(()=>spawnBurst(canvas),intervalMs);

    function draw(){
      const w=canvas.width,h=canvas.height;
      ctx.clearRect(0,0,w,h);
      particlesRef.current=particlesRef.current.filter(p=>p.life>0);
      for(const p of particlesRef.current){
        // Draw trail
        if(p.trail.length>1){
          ctx.beginPath();
          ctx.moveTo(p.trail[0].x,p.trail[0].y);
          for(let i=1;i<p.trail.length;i++) ctx.lineTo(p.trail[i].x,p.trail[i].y);
          ctx.strokeStyle=p.color;
          ctx.globalAlpha=p.alpha*0.3;
          ctx.lineWidth=p.size*0.5;
          ctx.stroke();
          ctx.globalAlpha=1;
        }
        // Draw particle head
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.globalAlpha=p.alpha;
        ctx.fill();
        // Glow
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size*1.8,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.globalAlpha=p.alpha*0.25;
        ctx.fill();
        ctx.globalAlpha=1;
        // Update
        p.trail.push({x:p.x,y:p.y});
        if(p.trail.length>5) p.trail.shift();
        p.x+=p.vx;
        p.y+=p.vy;
        p.vy+=p.gravity;
        p.vx*=0.97;
        p.life-=p.decay;
        p.alpha=Math.max(0,p.life);
      }
      rafRef.current=requestAnimationFrame(draw);
    }
    draw();

    return()=>{
      clearInterval(interval);
      cancelAnimationFrame(rafRef.current);
    };
  },[]);

  return(
    <canvas ref={canvasRef} style={{
      position:'absolute',inset:0,width:'100%',height:'100%',
      pointerEvents:'none',borderRadius:'inherit',
    }}/>
  );
}

function ReleasedTile({released,totalFilms,todayCount,theme}){
  const isToday=todayCount>0;

  // Animate from (released - todayCount) up to released using slot digits

  const[display,setDisplay]=useState(startVal);
  const rafRef=useRef(null);
  const startRef=useRef(null);
  const duration=1400;

  useEffect(()=>{
    if(!isToday){setDisplay(released);return;}
    setDisplay(startVal);
    startRef.current=null;
    // Step in integer increments so SlotDigit triggers on each whole number
    function step(ts){
      if(!startRef.current)startRef.current=ts;
      const t=Math.min((ts-startRef.current)/duration,1);
      const eased=1-Math.pow(1-t,3);
      setDisplay(Math.round(startVal+(released-startVal)*eased));
      if(t<1)rafRef.current=requestAnimationFrame(step);
    }
    const delay=setTimeout(()=>{rafRef.current=requestAnimationFrame(step);},500);
    return()=>{clearTimeout(delay);cancelAnimationFrame(rafRef.current);};
  },[released,todayCount]);

  // Format as "X/Y" and render each character through SlotDigit when today
  const str=`${display}/${totalFilms}`;

  return(
    <div style={{background:t.cardBg,border:`1px solid ${isToday?"#d4a843":t.border}`,borderRadius:8,padding:"12px 6px",textAlign:"center",position:"relative",overflow:"hidden",animation:isToday?"releaseGlow 2.5s ease-in-out infinite":undefined}}>

        }

    </div>
  );
}

// ─── SLOT MACHINE TICKER ─────────────────────────────────────────────────────
// Each digit slides up from below into position like a slot machine reel
function SlotDigit({digit, delay=0}){
  const[key,setKey]=useState(0);
  const[prev,setPrev]=useState(digit);
  const[curr,setCurr]=useState(digit);
  useEffect(()=>{
    if(digit!==prev){
      setPrev(curr);
      setCurr(digit);
      setKey(k=>k+1);
    }
  },[digit]);
  return(
    <span style={{display:'inline-block',position:'relative',overflow:'hidden',lineHeight:'inherit',verticalAlign:'bottom'}}>
      {/* Outgoing digit slides up and out */}
      {key>0&&<span key={`out-${key}`} style={{
        position:'absolute',top:0,left:0,right:0,textAlign:'center',
        animation:`slotOut 0.32s ease-in ${delay}ms forwards`,
        pointerEvents:'none',
      }}>{prev}</span>}
      {/* Incoming digit slides up from below */}
      <span key={`in-${key}`} style={{
        display:'block',textAlign:'center',
        animation:key>0?`slotUp 0.42s cubic-bezier(0.22,1,0.36,1) ${delay}ms both`:undefined,
      }}>{curr}</span>
    </span>
  );
}

function TickerNumber({value, duration=1800, formatter=v=>v}){
  const[display,setDisplay]=useState(value*0.90);
  const startRef=useRef(null);
  const rafRef=useRef(null);
  useEffect(()=>{
    const target=typeof value==='number'?value:0;
    const startVal=target*0.90;
    setDisplay(startVal);
    startRef.current=null;
    function step(ts){
      if(!startRef.current)startRef.current=ts;
      const elapsed=ts-startRef.current;
      const t=Math.min(elapsed/duration,1);
      const eased=Math.log(1+t*9)/Math.log(10);
      setDisplay(startVal+(target-startVal)*eased);
      if(t<1)rafRef.current=requestAnimationFrame(step);
    }
    rafRef.current=requestAnimationFrame(step);
    return()=>cancelAnimationFrame(rafRef.current);
  },[value,duration]);

  // Format the value then split into individual characters for per-char slot animation.
  // Key digits from the RIGHT so that when string length changes (e.g. $22M → $143M),
  // each digit position is stable and doesn't animate incorrectly across incompatible values.
  const formatted=formatter(display);
  const str=String(formatted);
  const chars=str.split('');
  const total=chars.length;

  return(
    <span style={{display:'inline-flex',alignItems:'baseline',letterSpacing:'inherit'}}>
      {chars.map((ch,i)=>{
        if(/[0-9]/.test(ch)){
          // Key from the right — rightmost digit is always key "r0", next is "r1" etc.
          const rightKey=`r${total-1-i}`;
          return <SlotDigit key={rightKey} digit={ch} delay={(total-1-i)*18}/>;
        }
        return <span key={`s${i}`}>{ch}</span>;
      })}
    </span>
  );
}

// Stores previous day's ranks in localStorage to detect position changes
const RANK_KEY_STABLE='sef_ranks_stable';
const RANK_KEY_PREV='sef_ranks_prev';
const RANK_WINDOW_MS=24*60*60*1000; // 24 hours

// Pure read — computes changes from localStorage, no side effects
function getRankChanges(ranked){
  const current={};
  ranked.forEach(e=>{current[e.name]=e.rank;});
  let stable=null,prev=null;
  try{
    const s=localStorage.getItem(RANK_KEY_STABLE);
    const p=localStorage.getItem(RANK_KEY_PREV);
    if(s) stable=JSON.parse(s);
    if(p) prev=JSON.parse(p);
  }catch(e){}
  if(!stable) return {};
  const stableRanks=stable.ranks||{};
  const hasChanged=ranked.some(e=>stableRanks[e.name]!==undefined&&stableRanks[e.name]!==e.rank);
  const withinWindow=Date.now()-(stable.timestamp||0)<RANK_WINDOW_MS;
  if(!hasChanged&&!withinWindow) return {};
  const refRanks=hasChanged?stableRanks:(prev&&prev.ranks)||stableRanks;
  const changes={};
  ranked.forEach(e=>{
    if(refRanks[e.name]!==undefined&&refRanks[e.name]!==e.rank){
      changes[e.name]=refRanks[e.name]-e.rank;
    }
  });
  console.log("[ranks] changes detected:",JSON.stringify(changes),"hasChanged:",hasChanged,"withinWindow:",withinWindow);
  return changes;
}

// Write only — commits current ranks to localStorage (call once per session after live data)
function commitRankStorage(ranked){
  const current={};
  ranked.forEach(e=>{current[e.name]=e.rank;});
  let stable=null;
  try{const s=localStorage.getItem(RANK_KEY_STABLE);if(s)stable=JSON.parse(s);}catch(e){}
  if(!stable){
    // First ever load — initialize with old timestamp so no animation on first visit
    try{localStorage.setItem(RANK_KEY_STABLE,JSON.stringify({ranks:current,timestamp:Date.now()-RANK_WINDOW_MS-1}));}catch(e){}
    console.log("[ranks] initialized stable storage");
    return;
  }
  const stableRanks=stable.ranks||{};
  const hasChanged=ranked.some(e=>stableRanks[e.name]!==undefined&&stableRanks[e.name]!==e.rank);
  if(hasChanged){
    try{
      localStorage.setItem(RANK_KEY_PREV,JSON.stringify({ranks:stableRanks}));
      localStorage.setItem(RANK_KEY_STABLE,JSON.stringify({ranks:current,timestamp:Date.now()}));
    }catch(e){}
    console.log("[ranks] committed new stable — ranks changed:",JSON.stringify(stableRanks),"→",JSON.stringify(current));
  }
}

function StandingsBO({data,studioNames,expandedExecs,toggleExec,previewChanges,liveStatus,myTeam}){
  const{ranked}=data;
  const maxGT=Math.max(...ranked.map(e=>e.grandTotal));

  // Rank changes: computed once after live data arrives, never from fallback
  const[realChanges,setRealChanges]=useState({});
  const committedRef=useRef(false);
  const[myCardFlash,setMyCardFlash]=useState(false);

  // Flash the current user's card once data is ready (no scroll)
  useEffect(()=>{
    if(!myTeam||!ranked.length) return;
    const timer=setTimeout(()=>{
      setMyCardFlash(true);
      setTimeout(()=>setMyCardFlash(false),1800);
    },600);
    return()=>clearTimeout(timer);
  },[myTeam,ranked.length]);

  useEffect(()=>{
    // Wait for live data (or fallback if fetch failed) before computing/committing
    if(committedRef.current) return;
    if(liveStatus==="loading") return;
    if(ranked.length===0) return;
    committedRef.current=true;
    const changes=getRankChanges(ranked);
    setRealChanges(changes);
    commitRankStorage(ranked);
    console.log("[ranks] committed after liveStatus:",liveStatus,"changes:",JSON.stringify(changes));
  },[liveStatus,ranked]);

  const rankChanges=previewChanges||realChanges;
  const hasAnyChange=Object.keys(rankChanges).length>0;

  // phase: "before" → "animate" → "done"
  const[phase,setPhase]=useState("done");
  const playedRef=useRef(false);
  const cardRefs=useRef({});
  const deltaRef=useRef({});

  // Old order for animation (sort by pre-change ranks)
  const oldOrder=useMemo(()=>[...ranked].sort((a,b)=>{
    const oa=a.rank-(rankChanges[a.name]||0);
    const ob=b.rank-(rankChanges[b.name]||0);
    return oa-ob;
  }),[rankChanges,ranked]);

  // Trigger animation when rankChanges updates (after live data)
  useEffect(()=>{
    if(!hasAnyChange||playedRef.current){return;}
    playedRef.current=true;
    setPhase("before");

    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        // Phase 2: measure where each card currently sits
        // Then measure where it WILL sit in new order by temporarily reading positions
        const positions={};
        Object.entries(cardRefs.current).forEach(([name,el])=>{
          if(el) positions[name]=el.getBoundingClientRect().top;
        });

        // Render in NEW order (done), then measure new positions, compute delta, apply inverse
        // Actually: we stay in old order but compute delta from rank difference × real card heights
        // We do this by looking at the sorted old positions and new rank targets
        const sortedByOldRank=oldOrder.map(e=>({name:e.name,top:positions[e.name]||0}));
        const sortedByNewRank=[...oldOrder].sort((a,b)=>a.rank-b.rank)
          .map(e=>({name:e.name,top:positions[e.name]||0}));

        // Build a map: for each exec, what y-offset do they need?
        const newTopByName={};
        sortedByNewRank.forEach((e,newIdx)=>{
          // The card that SHOULD be at newIdx is sortedByNewRank[newIdx]
          // Find where that slot's y position is from sortedByOldRank
          newTopByName[e.name]=sortedByOldRank[newIdx]?.top||0;
        });

        const deltas={};
        oldOrder.forEach(exec=>{
          const currentTop=positions[exec.name]||0;
          // Where does this card need to go?
          // It needs to move to where its new rank slot is
          const newRankIdx=exec.rank-1;
          const targetTop=sortedByOldRank[newRankIdx]?.top||currentTop;
          deltas[exec.name]=targetTop-currentTop;
        });
        deltaRef.current=deltas;

        // Phase 3: apply transforms (from current pos toward target)
        setPhase("animate");

        // Phase 4: after transition, snap to clean layout
        const done=setTimeout(()=>setPhase("done"),820);
        return()=>clearTimeout(done);
      });
    });
  },[]);

  const isAnimating=phase==="before"||phase==="animate";
  const displayOrder=isAnimating?oldOrder:ranked;

  return(
    <div>
      <div>
        {displayOrder.map(exec=>{
          const isOpen=phase==="done"&&expandedExecs&&expandedExecs.has(exec.name);
          const change=rankChanges[exec.name]||0;
          const hasChange=change!==0;
          const rose=change>0;
          const dy=phase==="animate"?(deltaRef.current[exec.name]||0):0;

          const isMyCard=myTeam&&exec.name===myTeam;
          const borderColor=myCardFlash&&isMyCard
            ?"rgba(245,200,66,0.8)"
            :hasChange
            ?(rose?"rgba(52,211,153,0.5)":"rgba(248,113,113,0.4)")
            :(exec.rank===1?"rgba(212,168,67,0.35)":isMyCard?"rgba(245,200,66,0.25)":"#222233");

          return(
            <div
              key={exec.name}
              ref={el=>cardRefs.current[exec.name]=el}
              style={{
                marginBottom:6,
                position:"relative",
                zIndex:rose&&isAnimating?10:1,
                transform:phase==="animate"?`translateY(${dy}px)`:"none",
                transition:phase==="animate"?"transform 0.72s ease-in-out":"none",
                willChange:phase==="animate"?"transform":"auto",
              }}
            >
              <div
                onClick={()=>phase==="done"&&toggleExec(exec.name)}
                style={{
                  display:"grid",
                  gridTemplateColumns:"52px 1fr auto auto",
                  gap:12,alignItems:"center",
                  padding:"14px 16px",
                  background:"#111119",
                  border:`1px solid ${borderColor}`,

                  borderLeft:`3px solid ${exec.rank<=3?["#d4a843","#9ca3af","#cd7f32"][exec.rank-1]:"#222233"}`,
                  cursor:phase==="done"?"pointer":"default",
                  userSelect:"none",
                }}
              >
                <div style={{textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{fontSize:28,fontWeight:900,color:exec.rank===1?"#d4a843":"#4a4a5e",lineHeight:1}}>
                    {exec.rank}
                  </div>
                  {hasChange&&(
                    <div style={{
                      fontSize:9,fontWeight:700,fontFamily:"monospace",

                      borderRadius:4,padding:"1px 5px",
                      display:"flex",alignItems:"center",gap:2,lineHeight:1.4,
                    }}>
                      {rose?"▲":"▼"}{Math.abs(change)}

                <div style={{minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"nowrap",minWidth:0}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:EXEC_COLORS[exec.name],flexShrink:0}}/>
                    <span style={{fontWeight:800,fontSize:16,flexShrink:0}}>{DISPLAY[exec.name]}</span>
                    {myTeam&&exec.name===myTeam&&<span style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",padding:"2px 6px",borderRadius:4,background:"rgba(245,200,66,0.12)",color:"#d4a843",border:"1px solid rgba(245,200,66,0.3)"}}>YOU</span>}

                  </div>
                  <div style={{display:"flex",gap:12,marginTop:5,fontSize:11,color:"#6a6a7e",fontFamily:"monospace",flexWrap:"wrap"}}>
                    {(()=>{

function BiggestMisses({films}){
  const [misses, setMisses] = useState(null);

  useEffect(()=>{
    // Try live Google Sheet first, fall back to embedded CSV
    const LIVE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQT4IsjOToQ2VQHupKe7NLLlrD6SxkYALrnOAwvtSKgL-wWr9SPFZ8O3ru7_AhXl9wi5isLXg_Psxjg/pub?gid=1844561946&single=true&output=csv";

    // Normalize a title for fuzzy matching: lowercase, strip leading "the "/"a ", strip punctuation
    function normTitle(t){
      return t.toLowerCase()
        .replace(/^(the |a |an )/,'')
        .replace(/[^a-z0-9 ]/g,'')
        .replace(/\s+/g,' ')
        .trim();
    }

    // Build set of normalized titles already on someone's slate
    const draftedNorms=new Set(films.map(f=>normTitle(f.title)));

    function parseUniverseCSV(text){
      const rows = parseCSV(text);
      const results = [];
      for(let i=1;i<rows.length;i++){
        const r = rows[i];
        if(!r||!r[0]) continue;
        const title = r[0].trim();
        if(!title) continue;
        const boRaw = (r[4]||"").trim();
        if(!boRaw || boRaw==="Not found" || boRaw==="Not released") continue;
        const bo = parseNum(boRaw);
        if(bo<=0) continue;
        // Check "On the Slate?" column
        const onSlate = (r[5]||"").trim().toUpperCase();
        if(onSlate==="YES") continue;
        // Also cross-check against actual slate titles (handles title mismatches)
        if(draftedNorms.has(normTitle(title))) continue;
        results.push({title, bo});
      }
      results.sort((a,b)=>b.bo-a.bo);
      return results.slice(0,3);
    }

    fetch(LIVE_URL)
      .then(r=>{ if(!r.ok) throw new Error('not ok'); return r.text(); })
      .then(text=>{ if(text.trim().startsWith('<')) throw new Error('html'); return text; })
      .then(text=>setMisses(parseUniverseCSV(text)))
      .catch(()=>setMisses(parseUniverseCSV(UNIVERSE_DATA)));
  },[]);

  const displayMisses = misses || [];
  const maxBO = displayMisses.length>0 ? Math.max(...displayMisses.map(m=>m.bo)) : 1;

  return(
    <div style={{background:"#111119",border:"1px solid #222233",borderRadius:10,padding:"16px 14px"}}>
      <div style={{fontSize:12,fontWeight:700,color:"#f59e0b",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}><span style={{display:"inline-flex",alignItems:"center",gap:4,marginRight:4}}><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 3l4 5 3-3 4 5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/><path d="M10 10h3V7" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg></span> Biggest Misses</div>
      <div style={{fontSize:10,color:"#6a6a7e",marginBottom:12}}>Highest-grossing released films from the 2026 Universe that nobody drafted</div>
      {displayMisses.length===0?(
        <div style={{padding:"20px",background:"#0e0e16",borderRadius:6,textAlign:"center"}}>
          <div style={{fontSize:12,color:"#6a6a7e"}}>{misses===null?"Loading...":"No un-drafted films with box office data yet."}</div>
        </div>
      ):(
        <div>
          {displayMisses.map((m,i)=>{
            const barPct = Math.min((m.bo/maxBO)*100,100);
            return(
              <MissRow key={i} m={m} i={i} barPct={barPct}/>
            );
          })}
          <div style={{marginTop:10,fontSize:10,color:"#4a4a5e",borderTop:"1px solid #1a1a28",paddingTop:8}}>Top 3 films in the 2026 Universe with box office but not on any exec's slate.</div>
        </div>
      )}
    </div>
  );
}

  const leggyFilms=films.filter(f=>f.opening>0&&f.bo>0).map(f=>({...f,legs:f.bo/f.opening}));

function BudgetDonut({exec}){
  const films=[...exec.films].sort((a,b)=>b.bid-a.bid);
  const rem=REMAINDERS[exec.name];const remaining=rem?rem.remaining:exec.remaining;
  const total=exec.totalSpent+remaining;const cx=56,cy=56;
  let cumAngle=0;const[hoverFilm,setHoverFilm]=useState(null);
  const[donutRef,inView]=useInView(0.3);
  const segments=films.map(f=>{const pct=f.bid/total;const seg={...f,pct,startAngle:cumAngle,endAngle:cumAngle+pct*360};cumAngle+=pct*360;return seg});
  if(remaining>0)segments.push({title:"Unspent",bid:remaining,team:exec.name,pct:remaining/total,startAngle:cumAngle,endAngle:cumAngle+(remaining/total)*360,isRemainder:true});
  function arcPath(s,e,ir,or){const tr=d=>(d-90)*Math.PI/180;const s1=tr(s),e1=tr(e);const la=e-s>180?1:0;return`M${cx+or*Math.cos(s1)},${cy+or*Math.sin(s1)} A${or},${or} 0 ${la} 1 ${cx+or*Math.cos(e1)},${cy+or*Math.sin(e1)} L${cx+ir*Math.cos(e1)},${cy+ir*Math.sin(e1)} A${ir},${ir} 0 ${la} 0 ${cx+ir*Math.cos(s1)},${cy+ir*Math.sin(s1)} Z`}
  const releasedCount=films.filter(f=>f.bo>0).length;
  return(
    <div ref={donutRef} style={{textAlign:"center",position:"relative",display:"flex",flexDirection:"column",alignItems:"center"}}>
      <svg width={112} height={112} viewBox="0 0 112 112" style={{display:"block",animation:inView?"donutFadeIn 0.6s ease-out both":undefined,opacity:inView?undefined:0}}>
        {segments.map((seg,i)=>{
          const gap=1;const start=seg.startAngle+gap/2;const end=seg.endAngle-gap/2;
          if(end<=start)return null;const isH=hoverFilm===i;
          const isReleased=!seg.isRemainder&&seg.bo>0;
          const color=seg.isRemainder?"#2a2a3a":EXEC_COLORS[seg.team];
          const opacity=seg.isRemainder?0.5:isReleased?(isH?1:0.85):(isH?0.45:0.18);
          return(<g key={i}>
            <path d={arcPath(start,end,28,isH?52:46)} fill={color} opacity={opacity} style={{cursor:"pointer",transition:"all 0.15s"}} onMouseEnter={()=>setHoverFilm(i)} onMouseLeave={()=>setHoverFilm(null)}/>
          </g>);
        })}
        <text x={cx} y={cy} textAnchor="middle" fill="#e8e8f0" fontSize={11} fontWeight={700} fontFamily="monospace">${total}M</text>
        <text x={cx} y={cy+12} textAnchor="middle" fill="#6a6a7e" fontSize={8} fontFamily="monospace">{releasedCount}/{films.length} out</text>
      </svg>
      <div style={{fontSize:12,fontWeight:700,color:EXEC_COLORS[exec.name],marginTop:2}}>{DISPLAY[exec.name]}</div>
      {hoverFilm!==null&&segments[hoverFilm]&&(
        <div style={{position:"absolute",top:-8,left:"50%",transform:"translate(-50%,-100%)",background:"#1e1e2e",border:"1px solid #3a3a50",borderRadius:6,padding:"6px 10px",fontSize:11,whiteSpace:"nowrap",zIndex:10,boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>
          <div style={{fontWeight:700}}>{segments[hoverFilm].title}</div>
          <div style={{color:"#6a6a7e"}}>${segments[hoverFilm].bid}M ({(segments[hoverFilm].pct*100).toFixed(1)}%)</div>
          {!segments[hoverFilm].isRemainder&&(<div style={{color:segments[hoverFilm].bo>0?"#34d399":"#6a6a7e",fontSize:10,marginTop:2}}>{segments[hoverFilm].bo>0?`Released: ${fmt(segments[hoverFilm].bo)}`:"Not yet released"}</div>)}
        </div>)}
    </div>);
}

// ─── BO SHARE DONUT — earnings + unspent budget share ──────────────────
function BOShareDonut({exec}){
  const releasedFilms=[...exec.films].filter(f=>f.bo>0).sort((a,b)=>b.bo-a.bo);
  const rem=REMAINDERS[exec.name];
  const remaining=(rem&&rem.remaining>0)?rem.remaining:0;
  const totalBO=exec.totalBO;
  const cx=56,cy=56;
  const[hoverIdx,setHoverIdx]=useState(null);
  const[donutRef,inView]=useInView(0.3);

  const remainingDollars=remaining*1e6;
  const grandTotal=totalBO+remainingDollars;

  // Arc path that correctly handles full-circle (SVG can't draw a full 360° arc in one command)
  function arcPath(s,e,ir,or){
    const tr=d=>(d-90)*Math.PI/180;
    const span=e-s;
    // For a nearly-full circle, split into two arcs
    if(span>=359.5){
      const m=s+span/2;
      const t1=tr(s),t2=tr(m),t3=tr(e);
      return[
        `M${cx+or*Math.cos(t1)},${cy+or*Math.sin(t1)}`,
        `A${or},${or} 0 1 1 ${cx+or*Math.cos(t2)},${cy+or*Math.sin(t2)}`,
        `A${or},${or} 0 1 1 ${cx+or*Math.cos(t3)},${cy+or*Math.sin(t3)}`,
        `L${cx+ir*Math.cos(t3)},${cy+ir*Math.sin(t3)}`,
        `A${ir},${ir} 0 1 0 ${cx+ir*Math.cos(t2)},${cy+ir*Math.sin(t2)}`,
        `A${ir},${ir} 0 1 0 ${cx+ir*Math.cos(t1)},${cy+ir*Math.sin(t1)}`,
        'Z'
      ].join(' ');
    }
    const s1=tr(s),e1=tr(e);
    const la=span>180?1:0;
    return`M${cx+or*Math.cos(s1)},${cy+or*Math.sin(s1)} A${or},${or} 0 ${la} 1 ${cx+or*Math.cos(e1)},${cy+or*Math.sin(e1)} L${cx+ir*Math.cos(e1)},${cy+ir*Math.sin(e1)} A${ir},${ir} 0 ${la} 0 ${cx+ir*Math.cos(s1)},${cy+ir*Math.sin(s1)} Z`;
  }

  // Zero state — dim placeholder ring
  if(grandTotal===0){
    return(
      <div ref={donutRef} style={{textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center"}}>
        <svg width={112} height={112} viewBox="0 0 112 112" style={{display:"block",animation:inView?"donutFadeIn 0.6s ease-out both":undefined,opacity:inView?undefined:0}}>
          <path d={arcPath(0,359.9,28,46)} fill={EXEC_COLORS[exec.name]} opacity={0.1}/>
          <text x={cx} y={cy+4} textAnchor="middle" fill="#4a4a5e" fontSize={9} fontFamily="monospace">$0</text>
        </svg>
        <div style={{fontSize:12,fontWeight:700,color:EXEC_COLORS[exec.name],marginTop:2}}>{DISPLAY[exec.name]}</div>
      </div>
    );
  }

  // Build segments
  const segments=[];
  let cumAngle=0;
  const isSingle=releasedFilms.length===0&&remainingDollars>0;

  releasedFilms.forEach(f=>{
    const pct=f.bo/grandTotal;
    if(pct<=0)return;
    const span=pct*360;
    segments.push({...f,pct,startAngle:cumAngle,endAngle:cumAngle+span,isRemainder:false});
    cumAngle+=span;
  });
  if(remainingDollars>0){
    const pct=remainingDollars/grandTotal;
    const span=isSingle?359.9:pct*360;
    segments.push({title:"Unspent Budget",bo:remainingDollars,pct,startAngle:isSingle?0:cumAngle,endAngle:isSingle?359.9:cumAngle+span,isRemainder:true,team:exec.name});
  }

  const brightnessLevels=[1,0.72,0.48,0.32,0.2,0.14];
  const centerLabel=fmt(grandTotal);
  const subLabel=releasedFilms.length>0?`${releasedFilms.length} film${releasedFilms.length!==1?"s":""}`:"budget only";

  return(
    <div ref={donutRef} style={{textAlign:"center",position:"relative",display:"flex",flexDirection:"column",alignItems:"center"}}>
      <svg width={112} height={112} viewBox="0 0 112 112" style={{display:"block",animation:inView?"donutFadeIn 0.6s ease-out both":undefined,opacity:inView?undefined:0}}>
        {segments.map((seg,i)=>{
          const isH=hoverIdx===i;
          const isOnly=segments.length===1;
          const gap=isOnly?0:1;
          const start=seg.startAngle+gap/2;
          const end=seg.endAngle-(isOnly?0:gap/2);
          const color=seg.isRemainder?"#2a2a3a":EXEC_COLORS[seg.team];
          const filmIdx=segments.slice(0,i).filter(s=>!s.isRemainder).length;
          const opacity=seg.isRemainder?0.65:Math.min(brightnessLevels[Math.min(filmIdx,brightnessLevels.length-1)]*(isH?1.12:1),1);
          if(!isOnly&&end<=start)return null;
          return(<g key={i}>
            <path d={arcPath(start,end,28,isH?52:46)} fill={color} opacity={opacity}
              style={{cursor:"pointer",transition:"all 0.15s"}}
              onMouseEnter={()=>setHoverIdx(i)} onMouseLeave={()=>setHoverIdx(null)}/>
          </g>);
        })}
        <text x={cx} y={cy} textAnchor="middle" fill="#e8e8f0" fontSize={9} fontWeight={700} fontFamily="monospace">{centerLabel}</text>
        <text x={cx} y={cy+11} textAnchor="middle" fill="#6a6a7e" fontSize={7} fontFamily="monospace">{subLabel}</text>
      </svg>
      <div style={{fontSize:12,fontWeight:700,color:EXEC_COLORS[exec.name],marginTop:2}}>{DISPLAY[exec.name]}</div>
      {hoverIdx!==null&&segments[hoverIdx]&&(
        <div style={{position:"absolute",top:-8,left:"50%",transform:"translate(-50%,-100%)",background:"#1e1e2e",border:"1px solid #3a3a50",borderRadius:6,padding:"6px 10px",fontSize:11,whiteSpace:"nowrap",zIndex:10,boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>
          <div style={{fontWeight:700}}>{segments[hoverIdx].title}</div>
          {segments[hoverIdx].isRemainder?(
            <div style={{color:"#6a6a7e",fontFamily:"monospace"}}>${remaining}M unspent</div>
          ):(
            <>
              <div style={{color:"#34d399",fontFamily:"monospace"}}>{fmt(segments[hoverIdx].bo)}</div>
              <div style={{color:"#6a6a7e",fontSize:10}}>{(segments[hoverIdx].pct*100).toFixed(1)}% of total value</div>
            </>
          )}
        </div>)}
    </div>);
}

  {key:"Best International Feature",nom_value:25, win_value:25, bp_win:false, slots:5},
