<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Join League — Studio Exec Fantasy</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="theme-color" content="#0d0d14">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d14;--bg2:#12121c;--bg3:#1a1a28;--border:#222233;--text:#e8e8f0;--muted:#6a6a7e;--gold:#f5c842;--green:#34d399;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:44px 40px;width:100%;max-width:440px;text-align:center}
.logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.12em;color:var(--gold);margin-bottom:32px;display:block;text-decoration:none}
.league-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;background:rgba(245,200,66,0.1);color:var(--gold);border:1px solid rgba(245,200,66,0.2);margin-bottom:16px}
.title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:0.06em;margin-bottom:8px}
.subtitle{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:28px}
.league-name{font-weight:700;color:var(--text)}
.btn{width:100%;padding:13px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all 0.15s;margin-bottom:10px}
.btn-primary{background:var(--gold);color:#0d0d14}
.btn-primary:hover{background:#f7d060}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:#3a3a50}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(13,13,20,0.3);border-top-color:#0d0d14;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px}
.alert{padding:12px 16px;border-radius:7px;font-size:13px;margin-bottom:16px;line-height:1.5;display:none}
.alert.show{display:block}
.alert-error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:var(--red)}
.alert-success{background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);color:var(--green)}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.form-group{margin-bottom:14px;text-align:left}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px}
.form-input{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:rgba(245,200,66,0.5)}
.form-input::placeholder{color:var(--muted)}
.tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
.tab{flex:1;padding:9px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif}
.tab.active{background:var(--bg3);color:var(--text)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn 0.35s ease-out}
</style>
</head>
<body>
<div class="card" id="card">
  <a class="logo" href="/">STUDIO EXEC FANTASY</a>
  <div id="stateLoading">
    <div style="width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px"></div>
    <div style="font-size:13px;color:var(--muted)">Looking up your invite...</div>
  </div>
  <div id="stateJoin" style="display:none"></div>
  <div id="stateAlready" style="display:none">
    <div class="league-badge">Already a Member</div>
    <div class="title">YOU'RE IN</div>
    <div class="subtitle">You're already a member of <span class="league-name" id="alreadyLeagueName"></span>.</div>
    <button class="btn btn-primary" id="alreadyBtn">Go to League</button>
  </div>
  <div id="stateInvalid" style="display:none">
    <div style="margin-bottom:16px;display:flex;justify-content:center"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="23" stroke="#6a6a7e" strokeWidth="1.5" opacity="0.3"/><rect x="14" y="22" width="20" height="14" rx="2" stroke="#6a6a7e" strokeWidth="1.5"/><path d="M17 22v-5a7 7 0 0 1 14 0v5" stroke="#6a6a7e" strokeWidth="1.5" strokeLinecap="round"/><circle cx="24" cy="29" r="1.5" fill="#6a6a7e"/></svg></div>
    <div class="title">INVALID INVITE</div>
    <div class="subtitle">This invite link is invalid or has expired. Ask your league admin for a new one.</div>
    <a href="/" class="btn btn-ghost" style="display:block;text-decoration:none;padding:13px">Back to Home</a>
  </div>
  <div id="stateSuccess" style="display:none">
    <div style="margin-bottom:16px;display:flex;justify-content:center"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="23" stroke="#d4a843" strokeWidth="1.5" opacity="0.3"/><rect x="13" y="17" width="22" height="14" rx="2" stroke="#d4a843" strokeWidth="1.5"/><path d="M13 21h22M13 27h22M17 17v4M17 27v4M23 17v4M23 27v4" stroke="#d4a843" strokeWidth="1.2" strokeLinecap="round"/></svg></div>
    <div class="title">YOU'RE IN!</div>
    <div class="subtitle">You've joined <span class="league-name" id="successLeagueName"></span>. Redirecting to your league...</div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://fymkwkbatklfynnhxrsf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5bWt3a2JhdGtsZnlubmh4cnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTIzOTksImV4cCI6MjA5NjM2ODM5OX0.XjO1xIS2WLF8JNIwIAKqjCL65ISkSu2u7VaeG8gzaew";

const params = new URLSearchParams(window.location.search);
const inviteCode = params.get('code');

function getSession() {
  try {
    const s = JSON.parse(localStorage.getItem('sef_session'));
    if (!s?.access_token) return null;
    if (s.expires_at && new Date(s.expires_at * 1000) < new Date()) return null;
    return s;
  } catch(e) { return null; }
}

function show(id) {
  ['stateLoading','stateJoin','stateAlready','stateInvalid','stateSuccess'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

async function sbGet(path) {
  const session = getSession();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${session?.access_token || SUPABASE_ANON_KEY}`
    }
  });
  if (!res.ok) return null;
  const data = await res.json();
  return Array.isArray(data) ? data[0] || null : data;
}

async function sbPost(path, body, token) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${token || SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(body)
  });
  return res;
}

async function joinLeague(league, session) {
  // Check if already a member
  const existing = await sbGet(`league_members?league_id=eq.${league.id}&user_id=eq.${session.user.id}&select=id`);
  if (existing) {
    document.getElementById('alreadyLeagueName').textContent = league.name;
    document.getElementById('alreadyBtn').onclick = () => window.location.href = `/league?id=${league.id}`;
    show('stateAlready');
    return;
  }

  // Add them as a member
  const res = await sbPost('league_members', {
    league_id: league.id,
    user_id: session.user.id,
    role: 'player',
    team_name: session.user.user_metadata?.display_name || session.user.email?.split('@')[0] || 'Player'
  }, session.access_token);

  if (res.ok || res.status === 409) {
    document.getElementById('successLeagueName').textContent = league.name;
    show('stateSuccess');
    setTimeout(() => window.location.href = `/league?id=${league.id}`, 2000);
  } else {
    show('stateInvalid');
  }
}

function renderJoinState(league, session) {
  const joinDiv = document.getElementById('stateJoin');
  joinDiv.innerHTML = `
    <div class="league-badge">You're Invited</div>
    <div class="title">JOIN THE LEAGUE</div>
    <div class="subtitle">You've been invited to join <span class="league-name">${league.name}</span>. Sign in or create an account to accept.</div>
    <div class="alert alert-error" id="joinError"></div>
    <div class="tabs">
      <button class="tab active" id="tabSignin" onclick="switchTab('signin')">Sign in</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Create account</button>
    </div>
    <div id="formSignin">
      <button class="btn btn-ghost" style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px" onclick="handleGoogleJoin('${league.id}')">
        <svg width="16" height="16" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <div class="divider">or</div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="siEmail" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="siPassword" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="btn btn-primary" id="siBtn" onclick="handleSignin('${league.id}')">Sign in and Join</button>
    </div>
    <div id="formSignup" style="display:none">
      <div class="form-group"><label class="form-label">Display Name</label><input class="form-input" type="text" id="suName" placeholder="How you'll appear in the league" autocomplete="name"/></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="suEmail" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="suPassword" placeholder="At least 8 characters" autocomplete="new-password"/></div>
      <button class="btn btn-primary" id="suBtn" onclick="handleSignup('${league.id}')">Create Account and Join</button>
    </div>
  `;
  show('stateJoin');
}

function switchTab(tab) {
  document.getElementById('tabSignin').classList.toggle('active', tab === 'signin');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('formSignin').style.display = tab === 'signin' ? 'block' : 'none';
  document.getElementById('formSignup').style.display = tab === 'signup' ? 'block' : 'none';
}

function showJoinError(msg) {
  const el = document.getElementById('joinError');
  el.textContent = msg;
  el.classList.add('show');
}

async function handleSignin(leagueId) {
  const email = document.getElementById('siEmail').value.trim();
  const password = document.getElementById('siPassword').value;
  if (!email || !password) { showJoinError('Please enter your email and password.'); return; }
  const btn = document.getElementById('siBtn');
  btn.innerHTML = '<span class="spinner"></span>Signing in...';
  btn.disabled = true;
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (!res.ok) {
    showJoinError(data.error_description || 'Sign in failed. Check your credentials.');
    btn.innerHTML = 'Sign in and Join'; btn.disabled = false; return;
  }
  localStorage.setItem('sef_session', JSON.stringify(data));
  // Now get the league and join
  const league = await sbGet(`leagues?invite_code=eq.${inviteCode}&select=id,name`);
  if (league) await joinLeague(league, data);
  else show('stateInvalid');
}

async function handleSignup(leagueId) {
  const name = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim();
  const password = document.getElementById('suPassword').value;
  if (!name || !email || !password) { showJoinError('Please fill in all fields.'); return; }
  if (password.length < 8) { showJoinError('Password must be at least 8 characters.'); return; }
  const btn = document.getElementById('suBtn');
  btn.innerHTML = '<span class="spinner"></span>Creating account...';
  btn.disabled = true;
  const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
    body: JSON.stringify({ email, password, data: { display_name: name } })
  });
  const data = await res.json();
  if (!res.ok) {
    showJoinError(data.error_description || 'Signup failed.');
    btn.innerHTML = 'Create Account and Join'; btn.disabled = false; return;
  }
  if (data.session) {
    localStorage.setItem('sef_session', JSON.stringify(data.session));
    const league = await sbGet(`leagues?invite_code=eq.${inviteCode}&select=id,name`);
    if (league) await joinLeague(league, data.session);
    else show('stateInvalid');
  } else {
    // Email confirmation required — store invite code and redirect after confirm
    localStorage.setItem('sef_pending_invite', inviteCode);
    document.getElementById('stateJoin').innerHTML = `
      <div class="league-badge">Check Your Email</div>
      <div class="title">ALMOST THERE</div>
      <div class="subtitle">We sent a confirmation to <strong>${email}</strong>. Click the link in your email, then come back here to join the league.</div>
    `;
  }
}

function handleGoogleJoin(leagueId) {
  // Store invite code so we can auto-join after Google OAuth completes
  localStorage.setItem('sef_pending_invite', inviteCode);
  const redirectTo = encodeURIComponent(`${window.location.origin}/join?code=${inviteCode}`);
  window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${redirectTo}`;
}

async function handleOAuthCallback() {
  const hash = window.location.hash;
  if (!hash || !hash.includes('access_token')) return false;
  const p = new URLSearchParams(hash.replace('#', ''));
  const accessToken = p.get('access_token');
  if (!accessToken) return false;
  const userRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${accessToken}` }
  });
  if (!userRes.ok) return false;
  const user = await userRes.json();
  const session = {
    access_token: accessToken,
    refresh_token: p.get('refresh_token'),
    expires_at: parseInt(p.get('expires_at')),
    user
  };
  localStorage.setItem('sef_session', JSON.stringify(session));
  history.replaceState(null, '', window.location.pathname + window.location.search);
  return session;
}

async function init() {
  if (!inviteCode) { show('stateInvalid'); return; }

  // Handle OAuth callback (Google sign-in)
  const oauthSession = await handleOAuthCallback();
  const session = oauthSession || getSession();

  // Look up the league by invite code
  const league = await sbGet(`leagues?invite_code=eq.${inviteCode}&select=id,name`);
  if (!league) { show('stateInvalid'); return; }

  if (session) {
    // Already logged in — join immediately
    await joinLeague(league, session);
  } else {
    // Not logged in — show sign in/up form
    renderJoinState(league, null);
  }
}

init();
</script>
</body>
</html>
